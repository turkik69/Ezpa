// ============ Wheel spin sound (Web Audio API, no external files) ============
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) {
    const Ctx = window.AudioContext || window.webkitAudioContext;
    audioCtx = new Ctx();
  }
  if (audioCtx.state === "suspended") audioCtx.resume();
  return audioCtx;
}

function playTick(volume) {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = "square";
    osc.frequency.value = 850 + Math.random() * 60;
    gain.gain.setValueAtTime(volume, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.045);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + 0.05);
  } catch (e) {
    // audio not available, fail silently
  }
}

function playLandThud() {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = "sine";
    osc.frequency.value = 180;
    gain.gain.setValueAtTime(0.18, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.35);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + 0.35);
  } catch (e) {}
}

// ============ Champion fanfare (original composition, Web Audio API) ============
// A short celebratory trumpet-and-drum fanfare, entirely synthesized —
// no external audio files or copyrighted material of any kind.
function playFanfareNote(ctx, startTime, freq, duration, volume) {
  // Two detuned sawtooth oscillators layered together approximate a bright
  // brass/trumpet timbre far better than a single pure tone would.
  [0, 6].forEach((detune) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = "sawtooth";
    osc.frequency.value = freq;
    osc.detune.value = detune;
    gain.gain.setValueAtTime(0, startTime);
    gain.gain.linearRampToValueAtTime(volume, startTime + 0.02);
    gain.gain.setValueAtTime(volume, startTime + duration * 0.6);
    gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(startTime);
    osc.stop(startTime + duration);
  });
}

function playFanfareDrumHit(ctx, startTime, volume) {
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = "triangle";
  osc.frequency.setValueAtTime(120, startTime);
  osc.frequency.exponentialRampToValueAtTime(45, startTime + 0.15);
  gain.gain.setValueAtTime(volume, startTime);
  gain.gain.exponentialRampToValueAtTime(0.001, startTime + 0.18);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start(startTime);
  osc.stop(startTime + 0.18);
}

function playChampionFanfare() {
  try {
    const ctx = getAudioCtx();
    const t0 = ctx.currentTime + 0.05;
    // Simple triumphant rising fanfare motif (royalty-free original melody),
    // followed by a sustained held final chord — the classic "victory call"
    // shape without copying any specific existing anthem's melody.
    const notes = [
      { t: 0.00, f: 523.25, d: 0.18, v: 0.22 }, // C5
      { t: 0.20, f: 523.25, d: 0.14, v: 0.20 }, // C5
      { t: 0.38, f: 659.25, d: 0.22, v: 0.24 }, // E5
      { t: 0.65, f: 783.99, d: 0.32, v: 0.26 }, // G5
      { t: 1.05, f: 1046.50, d: 0.55, v: 0.28 }, // C6 held
      { t: 1.05, f: 783.99, d: 0.55, v: 0.16 }, // G5 harmony under the held note
    ];
    notes.forEach((n) => playFanfareNote(ctx, t0 + n.t, n.f, n.d, n.v));
    [0, 0.20, 0.65, 1.05].forEach((t) => playFanfareDrumHit(ctx, t0 + t, 0.3));
  } catch (e) {
    // audio not available (e.g. autoplay blocked before any user gesture) — celebration still shows visually
  }
}

// Real physics-driven spin: rotation is animated frame-by-frame via
// requestAnimationFrame (not a CSS transition running independently), and a
// tick sound fires every time the wheel crosses a new segment boundary.
// Because both the visual position and the tick timing come from the exact
// same per-frame rotation value, they can never drift out of sync.
const wheelEl = { current: null }; // set by wheelStageHtml on render

function animateWheelSpin(n, winnerIdx, onDone) {
  const segAngle = 360 / n;
  const winnerCenter = winnerIdx * segAngle + segAngle / 2;
  const startRotation = wheelUi.rotation;
  const extraSpins = 6 + Math.floor(Math.random() * 3);
  // total angular distance to travel this spin (always positive, always forward)
  const currentNormalized = ((startRotation % 360) + 360) % 360;
  const targetNormalizedOffset = (360 - winnerCenter);
  let delta = (extraSpins * 360) + targetNormalizedOffset - currentNormalized;
  while (delta < extraSpins * 360) delta += 360; // safety, keeps it a forward multi-turn spin
  const endRotation = startRotation + delta;

  const DURATION = 4200;
  // ease-out cubic-bezier-like curve (matches the old visual feel, but now
  // it's sampled every frame instead of left to the browser's CSS engine)
  function easeOut(t) {
    return 1 - Math.pow(1 - t, 3.2);
  }

  let lastSegmentIndex = Math.floor(((360 - (startRotation % 360)) % 360) / segAngle);
  const startTime = performance.now();

  function frame(now) {
    const elapsed = now - startTime;
    const t = Math.min(1, elapsed / DURATION);
    const eased = easeOut(t);
    const rotation = startRotation + delta * eased;
    wheelUi.rotation = rotation;

    if (wheelEl.current) {
      wheelEl.current.style.transition = "none";
      wheelEl.current.style.transform = `rotate(${rotation}deg)`;
    }

    // figure out which segment is currently under the pointer (top, 0deg)
    // and fire a tick exactly when we cross into a new one
    const normalized = ((360 - (rotation % 360)) % 360);
    const segmentIndex = Math.floor(normalized / segAngle);
    if (segmentIndex !== lastSegmentIndex) {
      lastSegmentIndex = segmentIndex;
      const remainingFraction = 1 - t;
      playTick(0.05 + 0.13 * remainingFraction); // louder/sharper early, softer as it slows
    }

    if (t < 1) {
      requestAnimationFrame(frame);
    } else {
      wheelUi.rotation = endRotation;
      if (wheelEl.current) {
        wheelEl.current.style.transform = `rotate(${endRotation}deg)`;
      }
      onDone();
    }
  }
  requestAnimationFrame(frame);
}

function spinWheel() {
  const cur = appState.current;
  const remaining = cur.remaining;
  const n = remaining.length;
  if (wheelUi.spinning || n === 0) return;
  wheelUi.spinning = true;
  const winnerIdx = Math.floor(Math.random() * n);
  render(); // shows the "spinning" disabled button state; wheel element re-queried below

  // re-fetch the wheel element right after render, since render() rebuilt the DOM
  wheelEl.current = document.getElementById("wheelEl");

  animateWheelSpin(n, winnerIdx, async () => {
    const winner = remaining[winnerIdx];
    wheelUi.lastWinner = winner;
    const orderWithWinner = [...cur.wheelOrder, winner];
    const remainingAfterWinner = remaining.filter((_, i) => i !== winnerIdx);
    const halfSize = Math.ceil(cur.players.length / 2);
    const folded = foldRemainingIntoGroupTwo(orderWithWinner, remainingAfterWinner, cur.seededRunnerUp || null, halfSize);

    // Only clear the "spinning" flag once the new state is actually saved.
    // Otherwise a background poll landing in this exact window can render
    // the OLD state (still showing leftover players in the wheel) before
    // this update is persisted, making the wheel look like it needs to
    // keep spinning for players who were already auto-assigned.
    await updateCurrent({ wheelOrder: folded.wheelOrder, remaining: folded.remaining, seededRunnerUp: folded.seededRunnerUp });
    wheelUi.spinning = false;
    render();
    playLandThud();
  });
}

function proceedToGroups() {
  const cur = appState.current;
  const halfSize = Math.ceil(cur.players.length / 2);
  const gA = cur.wheelOrder.slice(0, halfSize);
  const gB = cur.wheelOrder.slice(halfSize);
  const buildA = buildRoundRobinMatches(gA);
  const buildB = buildRoundRobinMatches(gB);
  updateCurrent({
    stage: "groups", groupA: gA, groupB: gB,
    matchesA: buildA.matches,
    matchesB: buildB.matches,
    groupARoundByes: buildA.roundByes,
    groupBRoundByes: buildB.roundByes,
    groupATotalRounds: buildA.totalRounds,
    groupBTotalRounds: buildB.totalRounds,
  });
  sendPushNotification("🔮 التوقعات مفتوحة!", "اكتملت المجموعات — سجل توقعك للصاعدين والبطل قبل ما تبدأ النتائج");
}

function doUpdateMatchField(which, matchId, field, value) {
  const cur = appState.current;
  const key = which === "A" ? "matchesA" : which === "B" ? "matchesB" : "singleMatches";
  const list = cur[key];
  const parsed = value === "" ? null : Math.max(0, parseInt(value) || 0);
  notifyIfFreshHatTrick(list.find(m => m.id === matchId), field, parsed);
  const updated = list.map(m => m.id === matchId ? { ...m, [field]: parsed } : m);
  updateCurrent({ [key]: updated });
}

function doGoToKnockout() {
  const cur = appState.current;
  const logA = [], logB = [];
  const finalTableA = standingsFor(cur.groupA, cur.matchesA, logA);
  const finalTableB = standingsFor(cur.groupB, cur.matchesB, logB);
  const a1 = finalTableA[0], a2 = finalTableA[1];
  const b1 = finalTableB[0], b2 = finalTableB[1];
  const promotedNames = [a1?.name, a2?.name, b1?.name, b2?.name].filter(Boolean);
  updateCurrent({
    stage: "knockout",
    semis: {
      m1: { id:uid(), label:"نصف النهائي 1", a:a1, b:b2, scoreA:null, scoreB:null },
      m2: { id:uid(), label:"نصف النهائي 2", a:b1, b:a2, scoreA:null, scoreB:null },
    },
    tiebreakLog: [...(cur.tiebreakLog || []), ...logA, ...logB],
    fullStandings: [...finalTableA, ...finalTableB],
    promotedNames,
    // Explicit per-group split (rather than relying on promotedNames' array
    // order) so prediction scoring can check "did they pick the right 2 for
    // Group A" independently from Group B, unambiguously.
    promotedGroupA: [a1?.name, a2?.name].filter(Boolean),
    promotedGroupB: [b1?.name, b2?.name].filter(Boolean),
  });
  sendPushNotification("🥊 بدأت الأدوار الإقصائية!", `${a1?.name} ضد ${b2?.name} | ${b1?.name} ضد ${a2?.name}`);
}

// Single-group mode: top 4 of the overall table advance. Standard seeding
// crossover — 1st vs 4th, 2nd vs 3rd — so the top seed doesn't face the
// strongest remaining opponent in the first knockout round.
function doGoToKnockoutFromSingle() {
  const cur = appState.current;
  const log = [];
  const finalTable = standingsFor(cur.players, cur.singleMatches, log);
  const [p1, p2, p3, p4] = finalTable;
  const promotedNames = [p1?.name, p2?.name, p3?.name, p4?.name].filter(Boolean);
  updateCurrent({
    stage: "knockout",
    semis: {
      m1: { id:uid(), label:"نصف النهائي 1", a:p1, b:p4, scoreA:null, scoreB:null },
      m2: { id:uid(), label:"نصف النهائي 2", a:p2, b:p3, scoreA:null, scoreB:null },
    },
    tiebreakLog: [...(cur.tiebreakLog || []), ...log],
    fullStandings: finalTable,
    promotedNames,
    promotedTop4: promotedNames.slice(),
  });
  sendPushNotification("🥊 بدأت الأدوار الإقصائية!", `${p1?.name} ضد ${p4?.name} | ${p2?.name} ضد ${p3?.name}`);
}

// Shared by all three match-score update paths (group stage, semis, final).
// Fires a hat-trick notification only the instant a score first crosses
// into 3+ goals (comparing against the OLD value) — never re-fires if an
// admin nudges an already-3+ score while double-checking a result.
function notifyIfFreshHatTrick(match, field, newValue) {
  if (!match) return;
  const oldValue = match[field];
  const wasHatTrick = oldValue != null && oldValue >= 3;
  const isHatTrick = newValue != null && newValue >= 3;
  if (isHatTrick && !wasHatTrick) {
    const scorer = field === "scoreA" ? match.a : match.b;
    if (scorer) {
      sendPushNotification("🔥 هاتريك!", `${scorer.name} سجّل ${newValue} أهداف بمباراة وحدة!`);
    }
  }
}

function doUpdateSemiField(key, field, value) {
  const cur = appState.current;
  const semis = cur.semis;
  const parsed = value === "" ? null : Math.max(0, parseInt(value) || 0);
  notifyIfFreshHatTrick(semis[key], field, parsed);
  const updated = { ...semis, [key]: { ...semis[key], [field]: parsed } };
  updateCurrent({ semis: updated });
}

function doGoToFinal() {
  const semis = appState.current.semis;
  const w1 = semis.m1.scoreA > semis.m1.scoreB ? semis.m1.a : semis.m1.scoreA < semis.m1.scoreB ? semis.m1.b : null;
  const w2 = semis.m2.scoreA > semis.m2.scoreB ? semis.m2.a : semis.m2.scoreA < semis.m2.scoreB ? semis.m2.b : null;
  if (!w1 || !w2) return;
  updateCurrent({ final: { a: w1, b: w2, scoreA: null, scoreB: null } });
  sendPushNotification("🏆 النهائي!", `${w1.name} ضد ${w2.name} — من يتوّج بطلاً؟`);
}

function doUpdateFinalField(field, value) {
  const cur = appState.current;
  const parsed = value === "" ? null : Math.max(0, parseInt(value) || 0);
  notifyIfFreshHatTrick(cur.final, field, parsed);
  updateCurrent({ final: { ...cur.final, [field]: parsed } });
}

function doFinishKnockout() {
  const cur = appState.current;
  const final = cur.final;
  const champion = final.scoreA > final.scoreB ? final.a : final.scoreA < final.scoreB ? final.b : null;
  if (!champion) return;
  const runnerUp = champion.id === final.a.id ? final.b : final.a;
  const semis = cur.semis;
  const semifinalistsOut = [
    (semis.m1.a?.id === champion.id || semis.m1.a?.id === runnerUp.id) ? semis.m1.b : semis.m1.a,
    (semis.m2.a?.id === champion.id || semis.m2.a?.id === runnerUp.id) ? semis.m2.b : semis.m2.a,
  ];
  finishTournament(champion, runnerUp, semifinalistsOut, cur.fullStandings || []);
}

function doFinishSingleGroup() {
  const cur = appState.current;
  const finalTable = standingsFor(cur.players, cur.singleMatches, []);
  finishTournament(finalTable[0], finalTable[1], [], finalTable);
}

// ============ Historical stats ============
// ============ Predictions logic ============
// Predictions lock the instant the first match score is entered anywhere in
// the tournament — before that, nothing is decided yet so it's a genuine
// blind guess; after that, results start leaking information, so further
// changes would just be "predicting" what's already partly known.
function predictionsLocked(cur) {
  if (!cur) return true;
  const allMatches = [...(cur.matchesA || []), ...(cur.matchesB || []), ...(cur.singleMatches || [])];
  return allMatches.some(m => m.scoreA != null || m.scoreB != null);
}

// Whether this tournament format even has predictable structure. Tiny
// single-group tournaments (fewer than 4 players) finish straight from the
// table with no knockout bracket at all, so there's nothing meaningful to
// predict (no promotion, no final).
function predictionsSupported(cur) {
  if (!cur) return false;
  if (cur.groupMode === "two") return true;
  return cur.groupMode === "one" && (cur.players || []).length >= 4;
}

function myPrediction(tournamentId) {
  const user = getCurrentUser();
  if (!user) return null;
  return predictions.find(p => p.tournament_id === tournamentId && p.member_id === user.id) || null;
}

// Scores one saved prediction against one archived (finished) tournament.
// Returns total points plus a per-category breakdown for display.
function computePredictionPoints(archiveEntry, prediction) {
  let points = 0;
  const details = [];

  if (archiveEntry.promotedGroupA && prediction.predicted_group_a) {
    const correct = prediction.predicted_group_a.filter(n => archiveEntry.promotedGroupA.includes(n));
    points += correct.length * 1;
    details.push({ label: "صعود المجموعة الأولى", correct: correct.length, total: archiveEntry.promotedGroupA.length });
  }
  if (archiveEntry.promotedGroupB && prediction.predicted_group_b) {
    const correct = prediction.predicted_group_b.filter(n => archiveEntry.promotedGroupB.includes(n));
    points += correct.length * 1;
    details.push({ label: "صعود المجموعة الثانية", correct: correct.length, total: archiveEntry.promotedGroupB.length });
  }
  if (archiveEntry.promotedTop4 && prediction.predicted_top4) {
    const correct = prediction.predicted_top4.filter(n => archiveEntry.promotedTop4.includes(n));
    points += correct.length * 1;
    details.push({ label: "الصاعدون للإقصائي", correct: correct.length, total: archiveEntry.promotedTop4.length });
  }
  const actualFinalists = [archiveEntry.champion, archiveEntry.runnerUp].filter(Boolean);
  if (prediction.predicted_finalists && actualFinalists.length === 2) {
    const correct = prediction.predicted_finalists.filter(n => actualFinalists.includes(n));
    points += correct.length * 2;
    details.push({ label: "طرفا النهائي", correct: correct.length, total: 2 });
  }
  if (prediction.predicted_champion && archiveEntry.champion) {
    const correct = prediction.predicted_champion === archiveEntry.champion;
    if (correct) points += 5;
    details.push({ label: "البطل", correct: correct ? 1 : 0, total: 1 });
  }
  return { points, details };
}

// Cumulative prediction leaderboard across every finished tournament that
// had predictions saved against it.
function computePredictionLeaderboard(archive, allPredictions) {
  const perPlayer = {};
  archive.forEach((t) => {
    const tPreds = allPredictions.filter(p => p.tournament_id === t.id);
    tPreds.forEach((p) => {
      const { points } = computePredictionPoints(t, p);
      if (!perPlayer[p.member_name]) perPlayer[p.member_name] = { name: p.member_name, predictionPoints: 0 };
      perPlayer[p.member_name].predictionPoints += points;
    });
  });
  return Object.values(perPlayer).sort((a, b) => b.predictionPoints - a.predictionPoints).filter(x => x.predictionPoints > 0).slice(0, 5);
}

function computeHistoricalStats(archive) {
  const perPlayer = {};
  const ensure = (name) => {
    if (!perPlayer[name]) {
      perPlayer[name] = { name, titles:0, goalsScored:0, goalsConceded:0, promotions:0, runnerUps:0, finalAppearances:0, appearances:0, knockoutEligibleAppearances:0 };
    }
    return perPlayer[name];
  };
  archive.forEach((t) => {
    if (t.champion) { ensure(t.champion).titles++; ensure(t.champion).finalAppearances++; }
    if (t.runnerUp) { ensure(t.runnerUp).runnerUps++; ensure(t.runnerUp).finalAppearances++; }
    // A tournament only ever had a real knockout bracket (and therefore
    // "didn't advance" only means something) when promotedNames was
    // populated — that field is set exclusively by the two knockout-
    // qualifying code paths (two-group draw, or single-group with >=4
    // players). Small single-group tournaments (fewer than 4 players) skip
    // the knockout stage entirely and finish straight from the table, so
    // nobody there should be counted as having "failed" to advance — there
    // was never a bracket to advance into in the first place.
    const hadKnockoutStage = (t.promotedNames || []).length > 0;
    (t.players || []).forEach((p) => {
      const s = ensure(p.name);
      s.goalsScored += p.gf || 0; s.goalsConceded += p.ga || 0; s.appearances++;
      if (hadKnockoutStage) s.knockoutEligibleAppearances++;
    });
    (t.promotedNames || []).forEach((name) => ensure(name).promotions++);
  });
  const list = Object.values(perPlayer);
  const topBy = (key, count=5) => [...list].sort((a,b) => b[key]-a[key]).filter(x => x[key] > 0).slice(0, count);
  // "Least promoted" is ranked by how many times a player took part in a
  // group stage that actually HAD a knockout bracket but didn't make the
  // cut — not by raw promotion count, which unfairly favored/penalized
  // players just for playing fewer or more tournaments overall.
  const leastPromotions = list
    .map(x => ({ ...x, missedPromotions: x.knockoutEligibleAppearances - x.promotions }))
    .filter(x => x.knockoutEligibleAppearances >= 2 && x.missedPromotions > 0)
    .sort((a,b) => b.missedPromotions - a.missedPromotions || b.knockoutEligibleAppearances - a.knockoutEligibleAppearances)
    .slice(0, 5);
  return {
    mostTitles: topBy("titles"),
    mostGoalsScored: topBy("goalsScored"),
    mostGoalsConceded: topBy("goalsConceded"),
    mostRunnerUps: topBy("runnerUps"),
    mostFinalAppearances: topBy("finalAppearances"),
    leastPromotions,
  };
}

    <div class="add-member-box">
      <div class="add-member-label">+ إضافة عضو أو ضيف جديد</div>
      <div class="input-row">
        <input class="text-input" id="memberNameInput" placeholder="الاسم" value="${escapeHtml(addMemberDraft.name)}" oninput="updateAddMemberDraft('name', this.value)">
        <input class="text-input" id="memberClubInput" placeholder="النادي" value="${escapeHtml(addMemberDraft.club)}" oninput="updateAddMemberDraft('club', this.value)">
      </div>
      <label class="checkbox-row">
        <input type="checkbox" id="memberGuestInput" ${addMemberDraft.isGuest ? "checked" : ""} onchange="updateAddMemberDraft('isGuest', this.checked)">
        ضيف لهذا اليوم فقط (ينحذف تلقائياً عند إنهاء يوم اللعب)
      </label>
      <button class="primary-btn" style="width:100%" onclick="addMember()">+ إضافة إلى القائمة</button>
    </div>

    <div class="archive-divider"></div>
    <p class="hint" style="margin-bottom:10px;">لما تخلصون كل بطولات اليوم (مهما كان عددها)، اضغط الزر تحت عشان تصفّر التأكيدات استعداداً ليوم لعب جديد.</p>
    <button class="cta-btn danger" onclick="endPlayDay()">إنهاء يوم اللعب وتصفير التأكيدات</button>
  </div>`;
}

// ============ Render: Register / Tournament setup ============
function registerStageHtml() {
  const upcomingName = TOURNAMENT_NAMES[appState.tournamentIndex % TOURNAMENT_NAMES.length];
  const confirmed = members.filter(m => m.confirmed);
  const groupMode = window.__selectedGroupMode || "two";
  const minNeeded = groupMode === "two" ? 3 : 2;

  const confirmedListHtml = confirmed.length === 0
    ? `<div class="empty-note">ما فيه أحد مؤكد بعد. روح خانة "قائمة الأعضاء" وأكد حضورك أول.</div>`
    : confirmed.map((p,i) => `
        <div class="player-chip">
          <span class="player-num">${i+1}</span>
          <span style="flex:1; display:flex; align-items:center; gap:6px;">${coloredNameHtml(p.name)} <span style="opacity:0.55; display:flex; align-items:center; gap:4px;">— ${clubLogoHtml(p.club, 'club-logo-sm')}${escapeHtml(p.club)}</span></span>
        </div>`).join("");

  // Seeding box: only relevant in two-group mode, and only if the last
  // champion and/or runner-up actually confirmed attendance today.
  const championConfirmed = appState.lastChampion && confirmed.some(m => m.id === appState.lastChampion.id);
  const runnerUpConfirmed = appState.lastRunnerUp && confirmed.some(m => m.id === appState.lastRunnerUp.id);
  const useSeeding = window.__useSeeding !== false;
  let seedingBoxHtml = "";
  if (groupMode === "two" && (championConfirmed || runnerUpConfirmed)) {
    const parts = [];
    if (championConfirmed) parts.push(`بطل آخر بطولة (${escapeHtml(appState.lastChampion.name)}) ← المجموعة الأولى`);
    if (runnerUpConfirmed) parts.push(`وصيف آخر بطولة (${escapeHtml(appState.lastRunnerUp.name)}) ← المجموعة الثانية`);
    seedingBoxHtml = `
      <div class="add-member-box">
        <div class="add-member-label">تخصيص البطل والوصيف تلقائياً</div>
        <p class="hint" style="margin-bottom:10px;">${parts.join(" — ")}. باقي المشاركين يدخلون القرعة الدوارة عادي.</p>
        <label class="checkbox-row">
          <input type="checkbox" id="seedingToggle" ${useSeeding ? "checked" : ""} onchange="setUseSeeding(this.checked)">
          فعّل هذا التخصيص لهذه البطولة (بدل ما يدخلوا القرعة زي البقية)
        </label>
      </div>`;
  }

  return `<div class="card theme-gold">
    <div class="tournament-badge">🏆 البطولة القادمة: ${upcomingName}</div>
    <div class="section-icon-title"><span class="icon">🏁</span>بدء البطولة</div>
    <p class="hint">المشاركون هنا هم فقط من أكّدوا حضورهم من "قائمة الأعضاء". تقدرون تلعبون أكثر من بطولة بنفس اليوم بنفس المؤكدين — التأكيدات ما تتصفر إلا لما تضغطون "إنهاء يوم اللعب" من صفحة الأعضاء.</p>

    <div class="player-grid">${confirmedListHtml}</div>
    <div class="count-badge">عدد المؤكدين: ${confirmed.length}</div>

    <div class="mode-switch">
      <button class="mode-btn ${groupMode==='two'?'active':''}" onclick="setGroupMode('two')">مجموعتين (قرعة دوارة)</button>
      <button class="mode-btn ${groupMode==='one'?'active':''}" onclick="setGroupMode('one')">مجموعة واحدة (بدون قرعة)</button>
    </div>

    ${seedingBoxHtml}

    <button class="cta-btn" ${confirmed.length < minNeeded ? "disabled" : ""} onclick="startNewTournament()">
      ${groupMode==='two' ? 'تجهيز القرعة الدوارة ←' : 'إنشاء جدول المباريات ←'}
    </button>
  </div>`;
}

// ============ Render: Wheel / Groups / Knockout ============
function wheelStageHtml() {
  const cur = appState.current;
  const players = cur.players;
  const remaining = cur.remaining;
  const wheelOrder = cur.wheelOrder;
  const halfSize = Math.ceil(players.length / 2);
  const groupA = wheelOrder.slice(0, halfSize);
  const groupB = wheelOrder.slice(halfSize);
  const colors = ["#C9A24B","#1E3A63","#B8332B","#F2EEE3","#2E5C99","#8A6A2E"];
  const n = remaining.length;
  const wheelComplete = remaining.length === 0 && wheelOrder.length === players.length && players.length > 0;

  const labelsHtml = remaining.map((p,i) => {
    const segAngle = 360/n;
    const angle = i*segAngle + segAngle/2;
    return `<div class="wheel-label" style="transform: rotate(${angle}deg) translate(0,-108px) rotate(${-angle}deg)">${escapeHtml(p.name)}</div>`;
  }).join("");

  const groupAHtml = groupA.length === 0 ? `<div class="empty-note">—</div>`
    : groupA.map((p,i) => `<div class="group-row" style="display:flex; align-items:center; gap:6px;">${i+1}. ${coloredNameHtml(p.name)} <span style="opacity:0.5; display:flex; align-items:center; gap:4px;">— ${clubLogoHtml(p.club, 'club-logo-sm')}${escapeHtml(p.club||'')}</span></div>`).join("");
  const groupBHtml = groupB.length === 0 ? `<div class="empty-note">—</div>`
    : groupB.map((p,i) => `<div class="group-row" style="display:flex; align-items:center; gap:6px;">${i+1}. ${coloredNameHtml(p.name)} <span style="opacity:0.5; display:flex; align-items:center; gap:4px;">— ${clubLogoHtml(p.club, 'club-logo-sm')}${escapeHtml(p.club||'')}</span></div>`).join("");

  return `<div class="card theme-gold">
    <div class="tournament-badge">🏆 ${escapeHtml(cur.name)}</div>
    <div class="section-icon-title"><span class="icon">🎡</span>القرعة الدوارة</div>
    <p class="hint">اضغط "ابدأ الدوران" ليطلع اسم عشوائي ويروح تلقائياً لأحد الفريقين. بمجرد ما تكتمل المجموعة الأولى، الباقين ينتقلون تلقائياً للمجموعة الثانية بدون الحاجة لإكمال القرعة للجميع.</p>
    <div class="wheel-area">
      <div class="wheel-wrap">
        <div class="pointer">▼</div>
        <div class="wheel" id="wheelEl" style="transform: rotate(${wheelUi.rotation}deg); background: ${n>0?conicGradient(n,colors):'#0d1f38'}">
          ${labelsHtml}
        </div>
        <div class="wheel-hub">⚽</div>
      </div>
      <button class="spin-btn" ${wheelUi.spinning || n===0 ? "disabled" : ""} onclick="spinWheel()">
        ${wheelUi.spinning ? "...تدور" : (n===0 ? "اكتملت القرعة" : "ابدأ الدوران")}
      </button>
      ${wheelUi.lastWinner && !wheelUi.spinning ? `<div class="winner-banner">${escapeHtml(wheelUi.lastWinner.name)}</div>` : ""}
    </div>
    <div class="two-col">
      <div class="group-box"><h3 class="group-title">المجموعة الأولى</h3>${groupAHtml}</div>
      <div class="group-box"><h3 class="group-title">المجموعة الثانية</h3>${groupBHtml}</div>
    </div>
    ${wheelComplete ? `<button class="cta-btn" onclick="proceedToGroups()">الانتقال لجدول المباريات ←</button>` : ""}
    ${!wheelComplete && remaining.length === 0 && cur.seededRunnerUp ? `<div class="empty-note">جارِ تثبيت الوصيف بالمجموعة الثانية...</div>` : ""}
  </div>`;
}

function scoreTableHtml(table) {
  const rows = table.map((t,i) => `
    <tr class="${i<2?'qualify-row':''}">
      <td>${i+1}</td>
      <td style="text-align:right">${coloredNameHtml(t.name)}</td>
      <td>${t.played}</td>
      <td>${t.w}</td>
      <td>${t.d}</td>
      <td>${t.l}</td>
      <td>${t.gf}</td>
      <td>${t.ga}</td>
      <td>${t.gd>0?'+'+t.gd:t.gd}</td>
      <td style="font-weight:700">${t.pts}</td>
    </tr>`).join("");
  return `<table class="score-table">
    <thead><tr><th>#</th><th>اللاعب</th><th>لعب</th><th>ف</th><th>ت</th><th>خ</th><th>له</th><th>عليه</th><th>فأ</th><th>نقاط</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function groupPanelHtml(title, matches, whichKey, table, roundByes) {
  // Group matches by round number so they can be rendered as separate
  // "جولة" sections with a visual divider between them, matching how the
  // matches would actually be played matchday by matchday.
  const byRound = {};
  matches.forEach((m) => {
    const r = m.round || 1;
    byRound[r] = byRound[r] || [];
    byRound[r].push(m);
  });
  const roundNumbers = Object.keys(byRound).map(Number).sort((a, b) => a - b);

  const roundsHtml = roundNumbers.map((roundNum) => {
    const roundMatches = byRound[roundNum];
    const matchRows = roundMatches.map(m => `
      <div class="match-row">
        <span class="match-name">${coloredNameHtml(m.a.name)}</span>
        ${scoreSelectHtml(m.scoreA, `onchange="updateMatchField('${whichKey}','${m.id}','scoreA',this.value)"`)}
        <span class="vs">–</span>
        ${scoreSelectHtml(m.scoreB, `onchange="updateMatchField('${whichKey}','${m.id}','scoreB',this.value)"`)}
        <span class="match-name">${coloredNameHtml(m.b.name)}</span>
      </div>`).join("");

    const byePlayer = roundByes && roundByes[roundNum];
    const byeHtml = byePlayer
      ? `<div class="bye-note">💤 ${coloredNameHtml(byePlayer.name)} مستريح هذي الجولة (باي)</div>`
      : "";

    return `<div class="round-block">
      <div class="round-label">الجولة ${roundNum}</div>
      <div class="match-list">${matchRows}</div>
      ${byeHtml}
    </div>`;
  }).join("");

  const boxClass = whichKey === "A" ? "box-a" : whichKey === "B" ? "box-b" : "";
  return `<div class="group-box ${boxClass}">
    <h3 class="group-title">${title}</h3>
    ${roundsHtml}
    ${scoreTableHtml(table)}
  </div>`;
}

function groupsStageHtml() {
  const cur = appState.current;
  const tableA = standingsFor(cur.groupA, cur.matchesA, []);
  const tableB = standingsFor(cur.groupB, cur.matchesB, []);
  const allAPlayed = cur.matchesA.length > 0 && cur.matchesA.every(m => m.scoreA != null && m.scoreB != null);
  const allBPlayed = cur.matchesB.length > 0 && cur.matchesB.every(m => m.scoreA != null && m.scoreB != null);

  return `<div class="card theme-groups">
    <div class="tournament-badge">🏆 ${escapeHtml(cur.name)}</div>
    <div class="section-icon-title"><span class="icon">⚔️</span>دوري المجموعات</div>
    <p class="hint">اختر نتيجة كل مباراة من القوائم. ترتيب الصعود: نقاط ← أهداف مسجلة ← قرعة عشوائية عند التعادل التام.</p>
    <div class="two-col">
      ${groupPanelHtml("المجموعة الأولى 🟢", cur.matchesA, "A", tableA, cur.groupARoundByes)}
      ${groupPanelHtml("المجموعة الثانية 🔵", cur.matchesB, "B", tableB, cur.groupBRoundByes)}
    </div>
    <button class="cta-btn" ${!(allAPlayed && allBPlayed) ? "disabled" : ""} onclick="goToKnockout()">الانتقال لنصف النهائي ←</button>
    ${!(allAPlayed && allBPlayed) ? `<div class="empty-note">أكمل جميع نتائج المجموعتين للمتابعة</div>` : ""}
  </div>`;
}

function singleGroupStageHtml() {
  const cur = appState.current;
  const table = standingsFor(cur.players, cur.singleMatches, []);
  const allPlayed = cur.singleMatches.length > 0 && cur.singleMatches.every(m => m.scoreA != null && m.scoreB != null);
  const canGoKnockout = allPlayed && cur.players.length >= 4;
  const notEnoughForKnockout = allPlayed && cur.players.length < 4;
  return `<div class="card theme-groups">
    <div class="tournament-badge">🏆 ${escapeHtml(cur.name)}</div>
    <div class="section-icon-title"><span class="icon">🔀</span>مجموعة واحدة — الكل ضد الكل</div>
    <p class="hint">جدول مباريات عشوائي بين جميع المشاركين، بدون قرعة، مقسّم لجولات. أول 4 بالترتيب العام يصعدون للإقصائي: الأول يقابل الرابع، الثاني يقابل الثالث.</p>
    ${groupPanelHtml(`جدول المباريات (${cur.players.length} مشاركين)`, cur.singleMatches, "SINGLE", table, cur.singleRoundByes)}
    ${notEnoughForKnockout
      ? `<button class="cta-btn" onclick="finishSingleGroup()">إنهاء البطولة وتتويج البطل ←</button><div class="empty-note">عدد المشاركين أقل من 4، فما فيه إقصائي — البطل يتحدد من الترتيب العام مباشرة.</div>`
      : `<button class="cta-btn" ${!canGoKnockout ? "disabled" : ""} onclick="goToKnockoutFromSingle()">الانتقال لنصف النهائي ←</button>`
    }
    ${!allPlayed ? `<div class="empty-note">أكمل جميع نتائج الجدول للمتابعة</div>` : ""}
  </div>`;
}

function semiPanelHtml(label, match, key) {
  const tieWarn = (match.scoreA != null && match.scoreB != null && match.scoreA === match.scoreB)
    ? `<div class="warn-note">تعادل — الأدوار الإقصائية لازم يكون فيها فائز، عدّل النتيجة</div>` : "";
  return `<div class="group-box">
    <h3 class="group-title">${label}</h3>
    <div class="match-row">
      <span class="match-name">${match.a ? coloredNameHtml(match.a.name) : "—"}</span>
      ${scoreSelectHtml(match.scoreA, `onchange="updateSemiField('${key}','scoreA',this.value)"`)}
      <span class="vs">–</span>
      ${scoreSelectHtml(match.scoreB, `onchange="updateSemiField('${key}','scoreB',this.value)"`)}
      <span class="match-name">${match.b ? coloredNameHtml(match.b.name) : "—"}</span>
    </div>
    ${tieWarn}
  </div>`;
}

function knockoutStageHtml() {
  const cur = appState.current;
  const semis = cur.semis;
  const semisComplete = semis.m1.scoreA != null && semis.m1.scoreB != null && semis.m2.scoreA != null && semis.m2.scoreB != null;
  const final = cur.final;
  const champion = final && final.scoreA != null && final.scoreB != null
    ? (final.scoreA > final.scoreB ? final.a : final.scoreA < final.scoreB ? final.b : null) : null;

  let finalHtml = "";
  if (!final) {
    finalHtml = `<button class="cta-btn" ${!semisComplete ? "disabled" : ""} onclick="goToFinal()">الانتقال للنهائي ←</button>`;
  } else {
    finalHtml = `<div class="final-box">
      <h3 class="group-title">النهائي الكبير</h3>
      <div class="match-row">
        <span class="match-name">${coloredNameHtml(final.a.name)}</span>
        ${scoreSelectHtml(final.scoreA, `onchange="updateFinalField('scoreA',this.value)"`)}
        <span class="vs">–</span>
        ${scoreSelectHtml(final.scoreB, `onchange="updateFinalField('scoreB',this.value)"`)}
        <span class="match-name">${coloredNameHtml(final.b.name)}</span>
      </div>
      ${champion ? `
        <div class="champion-banner">بطل ${escapeHtml(cur.name)}: ${coloredNameHtml(champion.name)}</div>
        <button class="cta-btn" onclick="finishKnockout()">حفظ النتيجة النهائية وأرشفة البطولة ←</button>
      ` : ""}
    </div>`;
  }

  return `<div class="card theme-knockout">
    <div class="tournament-badge">🏆 ${escapeHtml(cur.name)}</div>
    <div class="section-icon-title"><span class="icon">🥇</span>الأدوار الإقصائية</div>
    <div class="two-col">
      ${semiPanelHtml("نصف النهائي 1", semis.m1, "m1")}
      ${semiPanelHtml("نصف النهائي 2", semis.m2, "m2")}
    </div>
    ${finalHtml}
  </div>`;
}

function predictionCheckboxRow(category, name, checked, maxCount) {
  const safeName = escapeHtml(name).replace(/'/g, "\\'");
  return `<label class="prediction-check-row">
    <input type="checkbox" ${checked ? "checked" : ""} onchange="togglePredictionPick('${category}','${safeName}',${maxCount})">
    ${coloredNameHtml(name)}
  </label>`;
}

function ensurePredictionDraft(cur) {
  if (!predictionDraft || predictionDraft.tournamentId !== cur.id) {
    const existing = myPrediction(cur.id);
    predictionDraft = {
      tournamentId: cur.id,
      groupA: existing?.predicted_group_a ? [...existing.predicted_group_a] : [],
      groupB: existing?.predicted_group_b ? [...existing.predicted_group_b] : [],
      top4: existing?.predicted_top4 ? [...existing.predicted_top4] : [],
      finalists: existing?.predicted_finalists ? [...existing.predicted_finalists] : [],
      champion: existing?.predicted_champion || null,
    };
  }
  return predictionDraft;
}

function predictionFormHtml(cur, draft) {
  let groupsHtml = "";
  if (cur.groupMode === "two") {
    const groupARows = cur.groupA.map(p => predictionCheckboxRow("groupA", p.name, draft.groupA.includes(p.name), 2)).join("");
    const groupBRows = cur.groupB.map(p => predictionCheckboxRow("groupB", p.name, draft.groupB.includes(p.name), 2)).join("");
    groupsHtml = `
      <div class="prediction-group-box">
        <div class="prediction-group-title">مين راح يصعد من المجموعة الأولى؟ (اختر 2)</div>
        ${groupARows}
      </div>
      <div class="prediction-group-box">
        <div class="prediction-group-title">مين راح يصعد من المجموعة الثانية؟ (اختر 2)</div>
        ${groupBRows}
      </div>`;
  } else {
    const top4Rows = cur.players.map(p => predictionCheckboxRow("top4", p.name, draft.top4.includes(p.name), 4)).join("");
    groupsHtml = `
      <div class="prediction-group-box">
        <div class="prediction-group-title">مين الأربعة اللي راح يصعدون للإقصائي؟ (اختر 4)</div>
        ${top4Rows}
      </div>`;
  }

  const finalistRows = cur.players.map(p => predictionCheckboxRow("finalists", p.name, draft.finalists.includes(p.name), 2)).join("");
  const championOptions = cur.players.map(p => `<option value="${escapeHtml(p.name)}" ${draft.champion === p.name ? "selected" : ""}>${escapeHtml(p.name)}</option>`).join("");

  return `
    ${groupsHtml}
    <div class="prediction-group-box">
      <div class="prediction-group-title">مين راح يكونون بالنهائي؟ (اختر 2)</div>
      ${finalistRows}
    </div>
    <div class="prediction-group-box">
      <div class="prediction-group-title">مين راح يكون البطل؟</div>
      <select class="text-input" onchange="setPredictionChampion(this.value)">
        <option value="">— اختر —</option>
        ${championOptions}
      </select>
    </div>
    <button class="cta-btn" onclick="submitPrediction()">🔒 حفظ توقعي نهائياً</button>
  `;
}

function predictionsListHtml(tournamentPreds) {
  if (tournamentPreds.length === 0) {
    return `<div class="empty-note">ولا أحد سجل توقعه بعد</div>`;
  }
  return `<div class="predictions-list">` + tournamentPreds.map(p => {
    const parts = [];
    if (p.predicted_group_a) parts.push(`مجموعة 1: ${p.predicted_group_a.map(n => coloredNameHtml(n)).join("، ")}`);
    if (p.predicted_group_b) parts.push(`مجموعة 2: ${p.predicted_group_b.map(n => coloredNameHtml(n)).join("، ")}`);
    if (p.predicted_top4) parts.push(`الصاعدون: ${p.predicted_top4.map(n => coloredNameHtml(n)).join("، ")}`);
    if (p.predicted_finalists) parts.push(`النهائي: ${p.predicted_finalists.map(n => coloredNameHtml(n)).join("، ")}`);
    if (p.predicted_champion) parts.push(`البطل: ${coloredNameHtml(p.predicted_champion)}`);
    return `<div class="prediction-row">
      <div class="prediction-row-name">${coloredNameHtml(p.member_name)}</div>
      <div class="prediction-row-picks">${parts.join(" · ")}</div>
    </div>`;
  }).join("") + `</div>`;
}

function myPredictionLockedHtml(myPred) {
  const parts = [];
  if (myPred.predicted_group_a) parts.push(`مجموعة 1: ${myPred.predicted_group_a.map(n => coloredNameHtml(n)).join("، ")}`);
  if (myPred.predicted_group_b) parts.push(`مجموعة 2: ${myPred.predicted_group_b.map(n => coloredNameHtml(n)).join("، ")}`);
  if (myPred.predicted_top4) parts.push(`الصاعدون: ${myPred.predicted_top4.map(n => coloredNameHtml(n)).join("، ")}`);
  if (myPred.predicted_finalists) parts.push(`النهائي: ${myPred.predicted_finalists.map(n => coloredNameHtml(n)).join("، ")}`);
  if (myPred.predicted_champion) parts.push(`البطل: ${coloredNameHtml(myPred.predicted_champion)}`);
  return `
    <div class="prediction-row" style="border-right-color:#E4C06E;">
      <div class="prediction-row-name">🔒 توقعك محفوظ ومقفول</div>

  `;

function predictionsSectionHtml(cur) {
  if (!predictionsSupported(cur)) return "";
  if (cur.stage === "wheel") return "";

  const locked = predictionsLocked(cur);
  const tournamentPreds = predictions.filter(p => p.tournament_id === cur.id);

  let bodyHtml;
  if (locked) {
    bodyHtml = `<p class="hint">🔒 التوقعات مقفولة (بدأت النتائج تنحسب). توقعات الجميع:</p>` + predictionsListHtml(tournamentPreds);
  } else {
    const user = getCurrentUser();
    if (!user) {
      bodyHtml = `<p class="hint">سجّل دخولك عشان تسجل توقعك لهذي البطولة.</p><button class="cta-btn" onclick="openLogin()">تسجيل الدخول</button>`;
    } else {
      // Each person's prediction locks the instant THEY save it (not just
      // when the tournament-wide lock kicks in) — once saved, show their
      // own picks read-only instead of the editable form, so nobody can
      // quietly second-guess and swap picks after committing.
      const myPred = myPrediction(cur.id);
      if (myPred) {
        bodyHtml = myPredictionLockedHtml(myPred) + `<div class="archive-divider"></div>` + predictionsListHtml(tournamentPreds);
      } else {
        const draft = ensurePredictionDraft(cur);
        bodyHtml = predictionFormHtml(cur, draft) + `<div class="archive-divider"></div>` + predictionsListHtml(tournamentPreds);
      }
    }
  }

  return `<div class="card theme-members" style="margin-top:20px;">
    <div class="section-icon-title"><span class="icon">🔮</span>توقعات المشاركين</div>
    ${bodyHtml}
  </div>`;
}

function tournamentFlowHtml() {
  const cur = appState.current;
  if (!cur) return registerStageHtml();
  let stageHtml = "";
  if (cur.stage === "wheel") stageHtml = wheelStageHtml();
  else if (cur.stage === "groups") stageHtml = groupsStageHtml();
  else if (cur.stage === "single") stageHtml = singleGroupStageHtml();
  else if (cur.stage === "knockout") stageHtml = knockoutStageHtml();

  const discardBar = `
    <div style="text-align:center; margin-top:14px;">
      <button class="member-remove-btn" style="font-size:12.5px; opacity:0.6;" onclick="discardCurrentTournament()">
        ✕ مسح هذه البطولة الجارية (حتى لو ما اكتملت)

  return stageHtml + predictionsSectionHtml(cur) + discardBar;
}

// Fireworks + confetti particle animation, drawn on a canvas that fills the
// celebration overlay. Re-initializes safely every time it's called (each
// render() rebuilds the DOM, so the previous canvas/animation frame is gone
// regardless — this just starts a fresh one against the new canvas node).
let celebrationAnimHandle = null;
let celebrationAnimRunningFor = null; // tracks which celebration instance is currently animating
function startCelebrationAnimation() {
  const canvas = document.getElementById("celebrationCanvas");
  if (!canvas) return;
  if (celebrationAnimHandle) cancelAnimationFrame(celebrationAnimHandle);

  const ctx = canvas.getContext("2d");
  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener("resize", resize);

  const colors = ["#E4C06E", "#C9A24B", "#F2EEE3", "#5ABE8C", "#5A96E6", "#D13F35"];
  const particles = [];

  function spawnFirework(x, y) {
    const count = 40 + Math.floor(Math.random() * 20);
    const color = colors[Math.floor(Math.random() * colors.length)];
    for (let i = 0; i < count; i++) {
      const angle = (Math.PI * 2 * i) / count;
      const speed = 2 + Math.random() * 3.5;
      particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 1,
        decay: 0.012 + Math.random() * 0.01,
        color,
        size: 2 + Math.random() * 2,
        type: "spark",
      });
    }
  }

  function spawnConfettiBatch() {
    for (let i = 0; i < 6; i++) {
      particles.push({
        x: Math.random() * canvas.width,
        y: -20,
        vx: (Math.random() - 0.5) * 1.5,
        vy: 1.5 + Math.random() * 2,
        life: 1,
        decay: 0.003,
        color: colors[Math.floor(Math.random() * colors.length)],
        size: 5 + Math.random() * 4,
        type: "confetti",
        rotation: Math.random() * 360,
        rotSpeed: (Math.random() - 0.5) * 10,
      });
    }
  }

  let elapsed = 0;
  let lastFireworkAt = -999;
  let lastTime = performance.now();

  function frame(now) {
    const dt = Math.min(now - lastTime, 50);
    lastTime = now;
    elapsed += dt;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // launch a new firework burst roughly every 550ms for the first 4.5s
    if (elapsed - lastFireworkAt > 550 && elapsed < 4500) {
      lastFireworkAt = elapsed;
      spawnFirework(
        canvas.width * (0.2 + Math.random() * 0.6),
        canvas.height * (0.18 + Math.random() * 0.32)
      );
    }
    // steady confetti fall throughout
    if (elapsed < 8000 && Math.random() < 0.9) spawnConfettiBatch();

    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      if (p.type === "spark") p.vy += 0.04; // gravity pulls sparks down
      if (p.type === "confetti") p.rotation += p.rotSpeed;
      p.life -= p.decay;
      if (p.life <= 0 || p.y > canvas.height + 30) {
        particles.splice(i, 1);
        continue;
      }
      ctx.globalAlpha = Math.max(p.life, 0);
      ctx.fillStyle = p.color;
      if (p.type === "spark") {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      } else {
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate((p.rotation * Math.PI) / 180);
        ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.6);
        ctx.restore();
      }
    }
    ctx.globalAlpha = 1;

    if (elapsed < 9000 && celebration) {
      celebrationAnimHandle = requestAnimationFrame(frame);
    } else {
      window.removeEventListener("resize", resize);
    }
  }
  celebrationAnimHandle = requestAnimationFrame(frame);
}

// ============ Lock down "app-like" gesture behavior ============
// Block pinch-to-zoom (Safari fires this even with user-scalable=no in some cases)
document.addEventListener("gesturestart", (e) => e.preventDefault());
document.addEventListener("gesturechange", (e) => e.preventDefault());
document.addEventListener("gestureend", (e) => e.preventDefault());

// Block double-tap-to-zoom without breaking normal single taps/clicks
let lastTouchEnd = 0;
document.addEventListener("touchend", (e) => {
  const now = Date.now();
  if (now - lastTouchEnd <= 300) e.preventDefault();
  lastTouchEnd = now;
}, { passive: false });

// Block the browser's native pull-to-refresh when already at the very top of the page
let touchStartY = 0;
document.addEventListener("touchstart", (e) => {
  touchStartY = e.touches[0].clientY;
}, { passive: true });
document.addEventListener("touchmove", (e) => {
  const touchY = e.touches[0].clientY;
  const scrollTop = document.body.scrollTop || document.documentElement.scrollTop;
  if (scrollTop <= 0 && touchY > touchStartY) {
    e.preventDefault();
  }
}, { passive: false });

init();
</script>
