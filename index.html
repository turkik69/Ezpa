<style>
  /* ============ Design tokens ============
     Stadium at night, navy sky: deep navy base, lit-navy mid panel, chalk-line cream,
     trophy gold (muted, not neon), and a real red-card red used only for warnings.
     --navy-deep    #0A1830   background base
     --navy-mid     #122A4D   panel background
     --navy-line    #1E3A63   hairline / divider
     --chalk        #F2EEE3   primary text / lines
     --chalk-dim    rgba(242,238,227,0.62)
     --gold         #C9A24B   accent / trophy
     --gold-bright  #E4C06E   hover / highlight
     --card-red     #B8332B   red card / warning only

  * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; margin:0; padding:0; -webkit-tap-highlight-color: transparent; font-weight: 500; }
  html, body {
    height: 100%;
    overscroll-behavior: none; /* kill pull-to-refresh and rubber-band bounce */
    touch-action: pan-y;      /* allow vertical scroll only, block pinch-zoom gestures */
  }
  html {
    overflow: hidden; /* the html/body themselves never scroll or bounce */
  }
  body {
    direction: rtl;
    height: 100%;
    overflow-y: auto;         /* the actual scrolling happens here, contained */
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    overscroll-behavior-y: contain; /* stop scroll chaining to the page/browser chrome */
    display: flex;
    flex-direction: column;
    align-items: center;      /* true horizontal centering of everything below */
    background:
      repeating-linear-gradient(0deg, rgba(255,255,255,0.012) 0px, rgba(255,255,255,0.012) 1px, transparent 1px, transparent 42px),

    color: #F2EEE3;
    padding: 20px 24px 90px;
    position: relative;
  }
  input[type=number]::-webkit-inner-spin-button { opacity: 1; }

  /* subtle radial glow behind header, like a stadium floodlight */

<script>
// ============ Supabase config ============
const SUPABASE_URL = "https://eooytvurkabmiooknbgk.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVvb3l0dnVya2FibWlvb2tuYmdrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwODY1NDcsImV4cCI6MjA5ODY2MjU0N30.deedSR1LO626DI42ANa6R9PX4USMZR_ss9SVrL_BR7s";
const STATE_ROW_ID = "ezba-league-main";
const REST_URL = SUPABASE_URL + "/rest/v1/ezba_league_state";
const MEMBERS_URL = SUPABASE_URL + "/rest/v1/ezba_league_members";

async function fetchState() {
  const res = await fetch(REST_URL + "?id=eq." + STATE_ROW_ID + "&select=data", {
    headers: { apikey: SUPABASE_KEY, Authorization: "Bearer " + SUPABASE_KEY },
  });
  if (!res.ok) throw new Error("fetch failed: " + res.status);
  const rows = await res.json();
  if (rows.length === 0) return null;
  return rows[0].data;
}

async function saveState(data) {
  const res = await fetch(REST_URL, {
    method: "POST",
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: "Bearer " + SUPABASE_KEY,
      "Content-Type": "application/json",
      Prefer: "resolution=merge-duplicates,return=minimal",
    },
    body: JSON.stringify({ id: STATE_ROW_ID, data, updated_at: new Date().toISOString() }),
  });
  if (!res.ok) {
    const t = await res.text();
    throw new Error("save failed: " + res.status + " " + t);
  }
}

async function fetchMembers() {
  const res = await fetch(MEMBERS_URL + "?select=*&order=created_at.asc", {
    headers: { apikey: SUPABASE_KEY, Authorization: "Bearer " + SUPABASE_KEY },
  });
  if (!res.ok) throw new Error("fetch members failed: " + res.status);
  return await res.json();
}

async function insertMember(member) {
  const res = await fetch(MEMBERS_URL, {
    method: "POST",
    headers: {
      apikey: SUPABASE_KEY, Authorization: "Bearer " + SUPABASE_KEY,
      "Content-Type": "application/json", Prefer: "return=minimal",
    },
    body: JSON.stringify(member),
  });
  if (!res.ok) { const t = await res.text(); throw new Error("insert member failed: " + t); }
}

// ============ Constants ============
const TOURNAMENT_NAMES = [
  "بطولة النخبة","بطولة الصقور","بطولة الفرسان","بطولة الأساطير","بطولة الأبطال",
  "بطولة الغزاة","بطولة الأسود","بطولة الصدارة","بطولة الرواد","بطولة القمة",
];

const uid = () => Math.random().toString(36).slice(2, 10);

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function roundRobinPairs(players) {
  const pairs = [];
  const list = [...players];
  if (list.length % 2 !== 0) list.push(null);
  const n = list.length;
  const rounds = n - 1;
  const arr = [...list];
  for (let r = 0; r < rounds; r++) {
    for (let i = 0; i < n / 2; i++) {
      const p1 = arr[i], p2 = arr[n - 1 - i];
      if (p1 && p2) pairs.push([p1, p2]);
    }
    const fixed = arr[0];
    const rest = arr.slice(1);
    rest.unshift(rest.pop());
    arr.splice(0, arr.length, fixed, ...rest);
  }
  return pairs;
}

function standingsFor(players, matches, tiebreakLog) {
  const table = {};
  players.forEach((p) => {
    table[p.id] = { id:p.id, name:p.name, played:0, w:0, d:0, l:0, gf:0, ga:0, gd:0, pts:0, redCards:0 };
  });
  matches.forEach((m) => {
    if (m.scoreA == null || m.scoreB == null) return;
    const a = table[m.a.id], b = table[m.b.id];
    if (!a || !b) return;
    a.played++; b.played++;
    a.gf += m.scoreA; a.ga += m.scoreB;
    b.gf += m.scoreB; b.ga += m.scoreA;
    a.redCards += m.redA || 0; b.redCards += m.redB || 0;
    if (m.scoreA > m.scoreB) { a.w++; b.l++; a.pts += 3; }
    else if (m.scoreA < m.scoreB) { b.w++; a.l++; b.pts += 3; }
    else { a.d++; b.d++; a.pts += 1; b.pts += 1; }
  });
  Object.values(table).forEach((t) => (t.gd = t.gf - t.ga));

  const list = Object.values(table);
  const byPts = {};
  list.forEach((t) => { byPts[t.pts] = byPts[t.pts] || []; byPts[t.pts].push(t); });
  const ptsKeysDesc = Object.keys(byPts).map(Number).sort((a,b) => b-a);

  const ordered = [];
  ptsKeysDesc.forEach((pts) => {
    const cluster = byPts[pts];
    if (cluster.length === 1) { ordered.push(cluster[0]); return; }
    const byGf = {};
    cluster.forEach((t) => { byGf[t.gf] = byGf[t.gf] || []; byGf[t.gf].push(t); });
    const gfKeysDesc = Object.keys(byGf).map(Number).sort((a,b) => b-a);
    gfKeysDesc.forEach((gf) => {
      const gfCluster = byGf[gf];
      if (gfCluster.length === 1) { ordered.push(gfCluster[0]); return; }
      const byRed = {};
      gfCluster.forEach((t) => { byRed[t.redCards] = byRed[t.redCards] || []; byRed[t.redCards].push(t); });
      const redKeysAsc = Object.keys(byRed).map(Number).sort((a,b) => a-b);
      redKeysAsc.forEach((red) => {
        const redCluster = byRed[red];
        if (redCluster.length === 1) { ordered.push(redCluster[0]); return; }
        const shuffled = shuffle(redCluster);
        if (tiebreakLog && shuffled.length >= 2) {
          tiebreakLog.push({ id:uid(), names:shuffled.map(s=>s.name), winner:shuffled[0].name, pts, gf, red });
        }
        ordered.push(...shuffled);
      });
    });
  });
  return ordered;
}

function conicGradient(n, colors) {
  const seg = 360/n;
  const stops = [];
  for (let i=0;i<n;i++){
    const c = colors[i % colors.length];
    stops.push(`${c} ${i*seg}deg ${(i+1)*seg}deg`);
  }
  return `conic-gradient(${stops.join(", ")})`;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, (c) => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

// builds a <select> for a 0-15 score dropdown
function scoreSelectHtml(value, onchangeAttr) {
  let opts = "";
  for (let i = 0; i <= 15; i++) {
    opts += `<option value="${i}" ${value === i ? "selected" : ""}>${i}</option>`;
  }
  const placeholderSelected = (value === null || value === undefined) ? "selected" : "";
  return `<select class="score-select" ${onchangeAttr}>
    <option value="" ${placeholderSelected}>-</option>
    ${opts}
  </select>`;
}

// builds a <select> for a 0-5 red card dropdown
function redSelectHtml(value, onchangeAttr) {
  let opts = "";
  for (let i = 0; i <= 5; i++) {
    opts += `<option value="${i}" ${value === i ? "selected" : ""}>${i}</option>`;
  }
  return `<select class="red-select" ${onchangeAttr}>${opts}</select>`;
}

// ---- Navigation history stack (for the back button) ----
// Each entry is a screen name the user visited, in order. The last entry
// is always the current screen; "back" drops it and shows whatever is now last.
let navStack = ["tournament"];
function goBack() {

  navStack.pop();
  view = navStack[navStack.length - 1];
  render();

const app = document.getElementById("app");
const syncBadge = document.getElementById("syncBadge");

// Counts in-flight local writes (state or members) so the background poll
// never overwrites a change the user just made before it's confirmed saved.
let pendingWrites = 0;

async function persist(next) {
  appState = next;
  render();
  syncBadge.textContent = "جارِ الحفظ...";
  pendingWrites++;
  try {
    await saveState(next);
    syncBadge.textContent = "متصل ✓ آخر تحديث: " + new Date().toLocaleTimeString("ar");
  } catch (e) {
    console.error(e);
    syncBadge.textContent = "تعذر الحفظ، حاول مرة ثانية";
  } finally {
    pendingWrites--;
  }
}

function isUserInteractingWithDropdown() {
  const active = document.activeElement;
  return !!(active && active.tagName === "SELECT");
}

async function pollLoad() {
  if (pendingWrites > 0) return; // a local change is still being saved, skip this cycle
  try {
    const [data, mem] = await Promise.all([fetchState(), fetchMembers()]);
    if (pendingWrites > 0) return; // a write started while we were fetching, discard this snapshot
    if (data && !wheelUi.spinning) appState = data;
    members = mem;
    // Don't tear down and rebuild the DOM while the user has a score/red-card
    // dropdown focused or open — that forces the browser to close it before
    // they've picked a value. The data above is still updated in memory, so
    // the next render (e.g. right after they pick a value) will reflect it.
    if (!isUserInteractingWithDropdown() && !wheelUi.spinning) {
      render();
    }
    syncBadge.textContent = "متصل ✓ مباشر";
  } catch (e) {
    console.error(e);
    syncBadge.textContent = "تعذر الاتصال بقاعدة البيانات";
  }
}

async function init() {
  await pollLoad();
  loaded = true;
  render();
  setInterval(pollLoad, 4000);
  startLiveClock();
}

// ============ Live clock (real device date/time, updates every second) ============
// Runs independently of render() so it's never disrupted by the dropdown-interaction
// guard in pollLoad, and never forces a full re-render of the rest of the app.
function updateClockDisplay() {
  const timeEl = document.getElementById("clockTime");
  const dateEl = document.getElementById("clockDate");
  if (!timeEl || !dateEl) return; // header not in the DOM yet (e.g. loading screen)
  const now = new Date();
  timeEl.textContent = now.toLocaleTimeString("ar", { hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: true });
  dateEl.textContent = now.toLocaleDateString("ar-SA-u-ca-gregory", { weekday: "long", day: "numeric", month: "long", year: "numeric" });
}

function startLiveClock() {
  updateClockDisplay();
  setInterval(updateClockDisplay, 1000);
}

// ============ Tournament actions ============
function startNewTournament() {
  const confirmedMembers = members.filter(m => m.confirmed);
  const players = confirmedMembers.map(m => ({ id: m.id, name: m.name, club: m.club }));
  const groupMode = window.__selectedGroupMode || "two";
  const name = TOURNAMENT_NAMES[appState.tournamentIndex % TOURNAMENT_NAMES.length];
  const base = {
    id: uid(), name, groupMode,
    stage: groupMode === "two" ? "wheel" : "single",
    players,
    wheelOrder: [],
    remaining: groupMode === "two" ? shuffle(players) : [],
    groupA: [], groupB: [],
    matchesA: [], matchesB: [],
    singleMatches: groupMode === "one"
      ? roundRobinPairs(shuffle(players)).map(([a,b]) => ({ id:uid(), a, b, scoreA:null, scoreB:null, redA:0, redB:0 }))
      : [],
    semis: null, final: null, tiebreakLog: [],
  };
  wheelUi = { rotation: 0, spinning: false, lastWinner: null };
  persist({ ...appState, current: base });
}

function updateCurrent(patch) {
  return persist({ ...appState, current: { ...appState.current, ...patch } });
}

async function finishTournament(champion, runnerUp, semifinalistsOut, finalStandingsAll) {
  const cur = appState.current;
  const archiveEntry = {
    id: uid(), name: cur.name,
    champion: champion?.name || null,
    runnerUp: runnerUp?.name || null,
    semifinalists: semifinalistsOut.map(p => p?.name).filter(Boolean),
    players: finalStandingsAll,
    promotedNames: cur.promotedNames || [],
  };
  // Confirmations are NOT reset here. Several tournaments can happen in the
  // same play day, so the confirmed list stays until the user explicitly
  // ends the play day from the members screen.
  await persist({
    tournamentIndex: appState.tournamentIndex + 1,
    archive: [...appState.archive, archiveEntry],
    current: null,
  });
  syncBadge.textContent = "تمت أرشفة البطولة ✓ — جاهزين لبطولة ثانية بنفس اليوم لو حبيتوا";
}

window.endPlayDay = async function() {
  if (!confirm("هل تبي تنهي يوم اللعب؟ راح تتصفر كل التأكيدات ويتحذف الضيوف المؤقتين، وتحتاجون تأكيد جديد لأي يوم لعب قادم.")) return;

// ============ Wheel spin sound (Web Audio API, no external files) ============
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) {
    const Ctx = window.AudioContext || window.webkitAudioContext;
    audioCtx = new Ctx();
  }
  if (audioCtx.state === "suspended") audioCtx.resume();
  return audioCtx;
}

function playTick(volume) {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = "square";
    osc.frequency.value = 850 + Math.random() * 60;
    gain.gain.setValueAtTime(volume, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.045);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + 0.05);
  } catch (e) {
    // audio not available, fail silently
  }
}

function playLandThud() {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = "sine";
    osc.frequency.value = 180;
    gain.gain.setValueAtTime(0.18, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.35);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + 0.35);
  } catch (e) {}
}

// Real physics-driven spin: rotation is animated frame-by-frame via
// requestAnimationFrame (not a CSS transition running independently), and a
// tick sound fires every time the wheel crosses a new segment boundary.
// Because both the visual position and the tick timing come from the exact
// same per-frame rotation value, they can never drift out of sync.
const wheelEl = { current: null }; // set by wheelStageHtml on render

function animateWheelSpin(n, winnerIdx, onDone) {
  const segAngle = 360 / n;
  const winnerCenter = winnerIdx * segAngle + segAngle / 2;
  const startRotation = wheelUi.rotation;
  const extraSpins = 6 + Math.floor(Math.random() * 3);
  // total angular distance to travel this spin (always positive, always forward)
  const currentNormalized = ((startRotation % 360) + 360) % 360;
  const targetNormalizedOffset = (360 - winnerCenter);
  let delta = (extraSpins * 360) + targetNormalizedOffset - currentNormalized;
  while (delta < extraSpins * 360) delta += 360; // safety, keeps it a forward multi-turn spin
  const endRotation = startRotation + delta;

  const DURATION = 4200;
  // ease-out cubic-bezier-like curve (matches the old visual feel, but now
  // it's sampled every frame instead of left to the browser's CSS engine)
  function easeOut(t) {
    return 1 - Math.pow(1 - t, 3.2);
  }

  let lastSegmentIndex = Math.floor(((360 - (startRotation % 360)) % 360) / segAngle);
  const startTime = performance.now();

  function frame(now) {
    const elapsed = now - startTime;
    const t = Math.min(1, elapsed / DURATION);
    const eased = easeOut(t);
    const rotation = startRotation + delta * eased;
    wheelUi.rotation = rotation;

    if (wheelEl.current) {
      wheelEl.current.style.transition = "none";
      wheelEl.current.style.transform = `rotate(${rotation}deg)`;
    }

    // figure out which segment is currently under the pointer (top, 0deg)
    // and fire a tick exactly when we cross into a new one
    const normalized = ((360 - (rotation % 360)) % 360);
    const segmentIndex = Math.floor(normalized / segAngle);
    if (segmentIndex !== lastSegmentIndex) {
      lastSegmentIndex = segmentIndex;
      const remainingFraction = 1 - t;
      playTick(0.05 + 0.13 * remainingFraction); // louder/sharper early, softer as it slows
    }

    if (t < 1) {
      requestAnimationFrame(frame);
    } else {
      wheelUi.rotation = endRotation;
      if (wheelEl.current) {
        wheelEl.current.style.transform = `rotate(${endRotation}deg)`;
      }
      onDone();
    }
  }
  requestAnimationFrame(frame);
}

function spinWheel() {
  const cur = appState.current;
  const remaining = cur.remaining;
  const n = remaining.length;
  if (wheelUi.spinning || n === 0) return;
  wheelUi.spinning = true;
  const winnerIdx = Math.floor(Math.random() * n);
  render(); // shows the "spinning" disabled button state; wheel element re-queried below

  // re-fetch the wheel element right after render, since render() rebuilt the DOM
  wheelEl.current = document.getElementById("wheelEl");

  animateWheelSpin(n, winnerIdx, async () => {
    const winner = remaining[winnerIdx];
    wheelUi.lastWinner = winner;
    let newOrder = [...cur.wheelOrder, winner];
    let newRemaining = remaining.filter((_, i) => i !== winnerIdx);

    // Once the first group reaches its full size, there's no need to keep
    // spinning for the rest — everyone left over automatically fills group two.
    const halfSize = Math.ceil(cur.players.length / 2);
    if (newOrder.length >= halfSize && newRemaining.length > 0) {
      newOrder = [...newOrder, ...newRemaining];
      newRemaining = [];
    }

    // Only clear the "spinning" flag once the new state is actually saved.
    // Otherwise a background poll landing in this exact window can render
    // the OLD state (still showing leftover players in the wheel) before
    // this update is persisted, making the wheel look like it needs to
    // keep spinning for players who were already auto-assigned.
    await updateCurrent({ wheelOrder: newOrder, remaining: newRemaining });
    wheelUi.spinning = false;
    render();
    playLandThud();
  });
}

function proceedToGroups() {
  const cur = appState.current;
  const halfSize = Math.ceil(cur.players.length / 2);
  const gA = cur.wheelOrder.slice(0, halfSize);
  const gB = cur.wheelOrder.slice(halfSize);
  updateCurrent({
    stage: "groups", groupA: gA, groupB: gB,
    matchesA: roundRobinPairs(gA).map(([a,b]) => ({ id:uid(), a, b, scoreA:null, scoreB:null, redA:0, redB:0 })),
    matchesB: roundRobinPairs(gB).map(([a,b]) => ({ id:uid(), a, b, scoreA:null, scoreB:null, redA:0, redB:0 })),
  });
}

function updateMatchField(which, matchId, field, value) {
  const cur = appState.current;
  const key = which === "A" ? "matchesA" : which === "B" ? "matchesB" : "singleMatches";
  const list = cur[key];
  const parsed = value === "" ? null : Math.max(0, parseInt(value) || 0);
  const updated = list.map(m => m.id === matchId ? { ...m, [field]: parsed } : m);
  updateCurrent({ [key]: updated });
}

function goToKnockout() {
  const cur = appState.current;
  const logA = [], logB = [];
  const finalTableA = standingsFor(cur.groupA, cur.matchesA, logA);
  const finalTableB = standingsFor(cur.groupB, cur.matchesB, logB);
  const a1 = finalTableA[0], a2 = finalTableA[1];
  const b1 = finalTableB[0], b2 = finalTableB[1];
  const promotedNames = [a1?.name, a2?.name, b1?.name, b2?.name].filter(Boolean);
  updateCurrent({
    stage: "knockout",
    semis: {
      m1: { id:uid(), label:"نصف النهائي 1", a:a1, b:b2, scoreA:null, scoreB:null },
      m2: { id:uid(), label:"نصف النهائي 2", a:b1, b:a2, scoreA:null, scoreB:null },
    },
    tiebreakLog: [...(cur.tiebreakLog || []), ...logA, ...logB],
    fullStandings: [...finalTableA, ...finalTableB],
    promotedNames,
  });
}

function updateSemiField(key, field, value) {
  const cur = appState.current;
  const semis = cur.semis;
  const parsed = value === "" ? null : Math.max(0, parseInt(value) || 0);
  const updated = { ...semis, [key]: { ...semis[key], [field]: parsed } };
  updateCurrent({ semis: updated });
}

function goToFinal() {
  const semis = appState.current.semis;
  const w1 = semis.m1.scoreA > semis.m1.scoreB ? semis.m1.a : semis.m1.scoreA < semis.m1.scoreB ? semis.m1.b : null;
  const w2 = semis.m2.scoreA > semis.m2.scoreB ? semis.m2.a : semis.m2.scoreA < semis.m2.scoreB ? semis.m2.b : null;
  if (!w1 || !w2) return;
  updateCurrent({ final: { a: w1, b: w2, scoreA: null, scoreB: null } });
}

function updateFinalField(field, value) {
  const cur = appState.current;
  const parsed = value === "" ? null : Math.max(0, parseInt(value) || 0);
  updateCurrent({ final: { ...cur.final, [field]: parsed } });
}

function finishKnockout() {
  const cur = appState.current;
  const final = cur.final;
  const champion = final.scoreA > final.scoreB ? final.a : final.scoreA < final.scoreB ? final.b : null;
  if (!champion) return;
  const runnerUp = champion.id === final.a.id ? final.b : final.a;
  const semis = cur.semis;
  const semifinalistsOut = [
    (semis.m1.a?.id === champion.id || semis.m1.a?.id === runnerUp.id) ? semis.m1.b : semis.m1.a,
    (semis.m2.a?.id === champion.id || semis.m2.a?.id === runnerUp.id) ? semis.m2.b : semis.m2.a,
  ];
  finishTournament(champion, runnerUp, semifinalistsOut, cur.fullStandings || []);
}

function finishSingleGroup() {
  const cur = appState.current;
  const finalTable = standingsFor(cur.players, cur.singleMatches, []);
  finishTournament(finalTable[0], finalTable[1], [], finalTable);
}

// ============ Historical stats ============
function computeHistoricalStats(archive) {
  const perPlayer = {};
  const ensure = (name) => {
    if (!perPlayer[name]) {
      perPlayer[name] = { name, titles:0, goalsScored:0, goalsConceded:0, promotions:0, runnerUps:0, finalAppearances:0, appearances:0 };
    }
    return perPlayer[name];
  };
  archive.forEach((t) => {
    if (t.champion) { ensure(t.champion).titles++; ensure(t.champion).finalAppearances++; }
    if (t.runnerUp) { ensure(t.runnerUp).runnerUps++; ensure(t.runnerUp).finalAppearances++; }
    (t.players || []).forEach((p) => {
      const s = ensure(p.name);
      s.goalsScored += p.gf || 0; s.goalsConceded += p.ga || 0; s.appearances++;
    });
    (t.promotedNames || []).forEach((name) => ensure(name).promotions++);
  });
  const list = Object.values(perPlayer);
  const topBy = (key, count=5) => [...list].sort((a,b) => b[key]-a[key]).filter(x => x[key] > 0).slice(0, count);
  const leastPromotions = [...list].filter(x => x.appearances >= 2)
    .sort((a,b) => a.promotions - b.promotions || b.appearances - a.appearances).slice(0, 5);
  return {
    mostTitles: topBy("titles"),
    mostGoalsScored: topBy("goalsScored"),
    mostGoalsConceded: topBy("goalsConceded"),
    mostRunnerUps: topBy("runnerUps"),
    mostFinalAppearances: topBy("finalAppearances"),
    leastPromotions,
  };
}

  const wheelComplete = remaining.length === 0 && wheelOrder.length === players.length && players.length > 0;

  const labelsHtml = remaining.map((p,i) => {
    const segAngle = 360/n;
    const angle = i*segAngle + segAngle/2;
    return `<div class="wheel-label" style="transform: rotate(${angle}deg) translate(0,-108px) rotate(${-angle}deg)">${escapeHtml(p.name)}</div>`;

        <p class="subtitle">${headerSubtitle} — بيانات مباشرة لكل المستخدمين</p>
      </div>
      <div class="clock-box" id="clockBox">
        <div class="clock-time" id="clockTime">${new Date().toLocaleTimeString("ar", { hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: true })}</div>
        <div class="clock-date" id="clockDate">${new Date().toLocaleDateString("ar-SA-u-ca-gregory", { weekday: "long", day: "numeric", month: "long", year: "numeric" })}</div>
      </div>
    </header>
    <div class="tab-row">
      <button class="tab-btn ${view==='members'?'active':''}" onclick="setView('members')">قائمة الأعضاء</button>
      <button class="tab-btn ${view==='tournament'?'active':''}" onclick="setView('tournament')">البطولة الحالية</button>
      <button class="tab-btn ${view==='stats'?'active':''}" onclick="setView('stats')">التصنيفات التاريخية</button>
    </div>
    <div class="layout">
      <main>
        ${view === "members" ? membersStageHtml() : ""}
        ${view === "tournament" ? tournamentFlowHtml() : ""}
        ${view === "stats" ? statsPanelHtml(appState.archive, false) : ""}
      </main>
      ${view === "tournament" ? `<aside class="sidebar">${statsPanelHtml(appState.archive, true)}</aside>` : ""}
    </div>
  `;
}

// ============ UI event handlers exposed globally ============
window.setGroupMode = function(mode) {
  window.__selectedGroupMode = mode;
  render();
};
window.setView = function(v) {
  if (navStack[navStack.length - 1] !== v) navStack.push(v);
  view = v;
  render();
};
window.goBack = goBack;
window.startNewTournament = startNewTournament;
window.spinWheel = spinWheel;
window.proceedToGroups = proceedToGroups;
window.updateMatchField = updateMatchField;
window.goToKnockout = goToKnockout;
window.updateSemiField = updateSemiField;
window.goToFinal = goToFinal;
window.updateFinalField = updateFinalField;
window.finishKnockout = finishKnockout;
window.finishSingleGroup = finishSingleGroup;

// ============ Lock down "app-like" gesture behavior ============
// Block pinch-to-zoom (Safari fires this even with user-scalable=no in some cases)
document.addEventListener("gesturestart", (e) => e.preventDefault());
document.addEventListener("gesturechange", (e) => e.preventDefault());
document.addEventListener("gestureend", (e) => e.preventDefault());

// Block double-tap-to-zoom without breaking normal single taps/clicks
let lastTouchEnd = 0;
document.addEventListener("touchend", (e) => {
  const now = Date.now();
  if (now - lastTouchEnd <= 300) e.preventDefault();
  lastTouchEnd = now;
}, { passive: false });

// Block the browser's native pull-to-refresh when already at the very top of the page
let touchStartY = 0;
document.addEventListener("touchstart", (e) => {
  touchStartY = e.touches[0].clientY;
}, { passive: true });
document.addEventListener("touchmove", (e) => {
  const touchY = e.touches[0].clientY;
  const scrollTop = document.body.scrollTop || document.documentElement.scrollTop;
  if (scrollTop <= 0 && touchY > touchStartY) {
    e.preventDefault();
  }
}, { passive: false });

init();
</script>
</body>
</html>
