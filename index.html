<body>
  <div class="floodlight-glow"></div>
  <div id="app"></div>
  <div class="sync-badge" id="syncBadge">جارِ الاتصال...</div>

<script>
// ============ Supabase config ============
const SUPABASE_URL = "https://eooytvurkabmiooknbgk.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVvb3l0dnVya2FibWlvb2tuYmdrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwODY1NDcsImV4cCI6MjA5ODY2MjU0N30.deedSR1LO626DI42ANa6R9PX4USMZR_ss9SVrL_BR7s";
const STATE_ROW_ID = "ezba-league-main";
const REST_URL = SUPABASE_URL + "/rest/v1/ezba_league_state";

async function fetchState() {
  const res = await fetch(REST_URL + "?id=eq." + STATE_ROW_ID + "&select=data", {
    headers: { apikey: SUPABASE_KEY, Authorization: "Bearer " + SUPABASE_KEY },
  });
  if (!res.ok) throw new Error("fetch failed: " + res.status);
  const rows = await res.json();
  if (rows.length === 0) return null;
  return rows[0].data;
}

async function saveState(data) {
  const res = await fetch(REST_URL, {
    method: "POST",
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: "Bearer " + SUPABASE_KEY,
      "Content-Type": "application/json",
      Prefer: "resolution=merge-duplicates,return=minimal",
    },
    body: JSON.stringify({ id: STATE_ROW_ID, data, updated_at: new Date().toISOString() }),
  });
  if (!res.ok) {
    const t = await res.text();
    throw new Error("save failed: " + res.status + " " + t);
  }
}

// ============ Constants ============
const TOURNAMENT_NAMES = [
  "بطولة النخبة","بطولة الصقور","بطولة الفرسان","بطولة الأساطير","بطولة الأبطال",
  "بطولة الغزاة","بطولة الأسود","بطولة الصدارة","بطولة الرواد","بطولة القمة",
];

const uid = () => Math.random().toString(36).slice(2, 10);

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function roundRobinPairs(players) {
  const pairs = [];
  const list = [...players];
  if (list.length % 2 !== 0) list.push(null);
  const n = list.length;
  const rounds = n - 1;
  const arr = [...list];
  for (let r = 0; r < rounds; r++) {
    for (let i = 0; i < n / 2; i++) {
      const p1 = arr[i], p2 = arr[n - 1 - i];
      if (p1 && p2) pairs.push([p1, p2]);
    }
    const fixed = arr[0];
    const rest = arr.slice(1);
    rest.unshift(rest.pop());
    arr.splice(0, arr.length, fixed, ...rest);
  }
  return pairs;
}

function standingsFor(players, matches, tiebreakLog) {
  const table = {};
  players.forEach((p) => {
    table[p.id] = { id:p.id, name:p.name, played:0, w:0, d:0, l:0, gf:0, ga:0, gd:0, pts:0, redCards:0 };
  });
  matches.forEach((m) => {
    if (m.scoreA == null || m.scoreB == null) return;
    const a = table[m.a.id], b = table[m.b.id];
    if (!a || !b) return;
    a.played++; b.played++;
    a.gf += m.scoreA; a.ga += m.scoreB;
    b.gf += m.scoreB; b.ga += m.scoreA;
    a.redCards += m.redA || 0; b.redCards += m.redB || 0;
    if (m.scoreA > m.scoreB) { a.w++; b.l++; a.pts += 3; }
    else if (m.scoreA < m.scoreB) { b.w++; a.l++; b.pts += 3; }
    else { a.d++; b.d++; a.pts += 1; b.pts += 1; }
  });
  Object.values(table).forEach((t) => (t.gd = t.gf - t.ga));

  const list = Object.values(table);
  const byPts = {};
  list.forEach((t) => { byPts[t.pts] = byPts[t.pts] || []; byPts[t.pts].push(t); });
  const ptsKeysDesc = Object.keys(byPts).map(Number).sort((a,b) => b-a);

  const ordered = [];
  ptsKeysDesc.forEach((pts) => {
    const cluster = byPts[pts];
    if (cluster.length === 1) { ordered.push(cluster[0]); return; }
    const byGf = {};
    cluster.forEach((t) => { byGf[t.gf] = byGf[t.gf] || []; byGf[t.gf].push(t); });
    const gfKeysDesc = Object.keys(byGf).map(Number).sort((a,b) => b-a);
    gfKeysDesc.forEach((gf) => {
      const gfCluster = byGf[gf];
      if (gfCluster.length === 1) { ordered.push(gfCluster[0]); return; }
      const byRed = {};
      gfCluster.forEach((t) => { byRed[t.redCards] = byRed[t.redCards] || []; byRed[t.redCards].push(t); });
      const redKeysAsc = Object.keys(byRed).map(Number).sort((a,b) => a-b);
      redKeysAsc.forEach((red) => {
        const redCluster = byRed[red];
        if (redCluster.length === 1) { ordered.push(redCluster[0]); return; }
        const shuffled = shuffle(redCluster);
        if (tiebreakLog && shuffled.length >= 2) {
          tiebreakLog.push({ id:uid(), names:shuffled.map(s=>s.name), winner:shuffled[0].name, pts, gf, red });
        }
        ordered.push(...shuffled);
      });
    });
  });
  return ordered;
}

function conicGradient(n, colors) {
  const seg = 360/n;
  const stops = [];
  for (let i=0;i<n;i++){
    const c = colors[i % colors.length];
    stops.push(`${c} ${i*seg}deg ${(i+1)*seg}deg`);
  }
  return `conic-gradient(${stops.join(", ")})`;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, (c) => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

// ============ App State ============
const emptyState = () => ({ tournamentIndex: 0, archive: [], current: null });
let appState = emptyState();
let loaded = false;
let view = "tournament";
let registerDraft = { players: [], nameInput: "", groupMode: "two" };
let wheelUi = { rotation: 0, spinning: false, lastWinner: null };
let saving = false;

const app = document.getElementById("app");
const syncBadge = document.getElementById("syncBadge");

async function persist(next) {
  appState = next;
  render();
  saving = true;
  syncBadge.textContent = "جارِ الحفظ...";
  try {
    await saveState(next);
    syncBadge.textContent = "متصل ✓ آخر تحديث: " + new Date().toLocaleTimeString("ar");
  } catch (e) {
    console.error(e);
    syncBadge.textContent = "تعذر الحفظ، حاول مرة ثانية";
  }
  saving = false;
}

async function pollLoad() {
  try {
    const data = await fetchState();
    if (data) {
      // avoid clobbering local wheel spin animation mid-flight
      if (!wheelUi.spinning) {
        appState = data;
        render();
      }
    }
    syncBadge.textContent = "متصل ✓ مباشر";
  } catch (e) {
    console.error(e);
    syncBadge.textContent = "تعذر الاتصال بقاعدة البيانات";
  }
}

async function init() {
  await pollLoad();
  loaded = true;
  render();
  setInterval(pollLoad, 4000);
}

// ============ Actions ============
function startNewTournament() {
  const players = registerDraft.players;
  const groupMode = registerDraft.groupMode;
  const name = TOURNAMENT_NAMES[appState.tournamentIndex % TOURNAMENT_NAMES.length];
  const base = {
    id: uid(), name, groupMode,
    stage: groupMode === "two" ? "wheel" : "single",
    players,
    wheelOrder: [],
    remaining: groupMode === "two" ? shuffle(players) : [],
    groupA: [], groupB: [],
    matchesA: [], matchesB: [],
    singleMatches: groupMode === "one"
      ? roundRobinPairs(shuffle(players)).map(([a,b]) => ({ id:uid(), a, b, scoreA:null, scoreB:null, redA:0, redB:0 }))
      : [],
    semis: null, final: null, tiebreakLog: [],
  };
  registerDraft = { players: [], nameInput: "", groupMode: "two" };
  wheelUi = { rotation: 0, spinning: false, lastWinner: null };
  persist({ ...appState, current: base });
}

function updateCurrent(patch) {
  persist({ ...appState, current: { ...appState.current, ...patch } });
}

function finishTournament(champion, runnerUp, semifinalistsOut, finalStandingsAll) {
  const cur = appState.current;
  const archiveEntry = {
    id: uid(), name: cur.name,
    champion: champion?.name || null,
    runnerUp: runnerUp?.name || null,
    semifinalists: semifinalistsOut.map(p => p?.name).filter(Boolean),
    players: finalStandingsAll,
    promotedNames: cur.promotedNames || [],
  };
  persist({
    tournamentIndex: appState.tournamentIndex + 1,
    archive: [...appState.archive, archiveEntry],
    current: null,
  });
}

function spinWheel() {
  const cur = appState.current;
  const remaining = cur.remaining;
  const n = remaining.length;
  if (wheelUi.spinning || n === 0) return;
  wheelUi.spinning = true;
  const winnerIdx = Math.floor(Math.random() * n);
  const segAngle = 360 / n;
  const winnerCenter = winnerIdx * segAngle + segAngle / 2;
  const extraSpins = 6 + Math.floor(Math.random() * 3);
  const targetRotation = wheelUi.rotation + extraSpins * 360 + (360 - winnerCenter) - (wheelUi.rotation % 360);
  wheelUi.rotation = targetRotation;
  render();

  setTimeout(() => {
    const winner = remaining[winnerIdx];
    wheelUi.lastWinner = winner;
    wheelUi.spinning = false;
    const newOrder = [...cur.wheelOrder, winner];
    const newRemaining = remaining.filter((_, i) => i !== winnerIdx);
    updateCurrent({ wheelOrder: newOrder, remaining: newRemaining });
  }, 4200);
}

function proceedToGroups() {
  const cur = appState.current;
  const halfSize = Math.ceil(cur.players.length / 2);
  const gA = cur.wheelOrder.slice(0, halfSize);
  const gB = cur.wheelOrder.slice(halfSize);
  updateCurrent({
    stage: "groups", groupA: gA, groupB: gB,
    matchesA: roundRobinPairs(gA).map(([a,b]) => ({ id:uid(), a, b, scoreA:null, scoreB:null, redA:0, redB:0 })),
    matchesB: roundRobinPairs(gB).map(([a,b]) => ({ id:uid(), a, b, scoreA:null, scoreB:null, redA:0, redB:0 })),
  });
}

function updateMatchField(which, matchId, field, value) {
  const cur = appState.current;
  const key = which === "A" ? "matchesA" : which === "B" ? "matchesB" : "singleMatches";
  const list = cur[key];
  const parsed = value === "" ? null : Math.max(0, parseInt(value) || 0);
  const updated = list.map(m => m.id === matchId ? { ...m, [field]: parsed } : m);
  updateCurrent({ [key]: updated });
}

function goToKnockout() {
  const cur = appState.current;
  const logA = [], logB = [];
  const finalTableA = standingsFor(cur.groupA, cur.matchesA, logA);
  const finalTableB = standingsFor(cur.groupB, cur.matchesB, logB);
  const a1 = finalTableA[0], a2 = finalTableA[1];
  const b1 = finalTableB[0], b2 = finalTableB[1];
  const promotedNames = [a1?.name, a2?.name, b1?.name, b2?.name].filter(Boolean);
  updateCurrent({
    stage: "knockout",
    semis: {
      m1: { id:uid(), label:"نصف النهائي 1", a:a1, b:b2, scoreA:null, scoreB:null },
      m2: { id:uid(), label:"نصف النهائي 2", a:b1, b:a2, scoreA:null, scoreB:null },
    },
    tiebreakLog: [...(cur.tiebreakLog || []), ...logA, ...logB],
    fullStandings: [...finalTableA, ...finalTableB],
    promotedNames,
  });
}

function updateSemiField(key, field, value) {
  const cur = appState.current;
  const semis = cur.semis;
  const parsed = value === "" ? null : Math.max(0, parseInt(value) || 0);
  const updated = { ...semis, [key]: { ...semis[key], [field]: parsed } };
  updateCurrent({ semis: updated });
}

function goToFinal() {
  const semis = appState.current.semis;
  const w1 = semis.m1.scoreA > semis.m1.scoreB ? semis.m1.a : semis.m1.scoreA < semis.m1.scoreB ? semis.m1.b : null;
  const w2 = semis.m2.scoreA > semis.m2.scoreB ? semis.m2.a : semis.m2.scoreA < semis.m2.scoreB ? semis.m2.b : null;
  if (!w1 || !w2) return;
  updateCurrent({ final: { a: w1, b: w2, scoreA: null, scoreB: null } });
}

function updateFinalField(field, value) {
  const cur = appState.current;
  const parsed = value === "" ? null : Math.max(0, parseInt(value) || 0);
  updateCurrent({ final: { ...cur.final, [field]: parsed } });
}

function finishKnockout() {
  const cur = appState.current;
  const final = cur.final;
  const champion = final.scoreA > final.scoreB ? final.a : final.scoreA < final.scoreB ? final.b : null;
  if (!champion) return;
  const runnerUp = champion.id === final.a.id ? final.b : final.a;
  const semis = cur.semis;
  const semifinalistsOut = [
    (semis.m1.a?.id === champion.id || semis.m1.a?.id === runnerUp.id) ? semis.m1.b : semis.m1.a,
    (semis.m2.a?.id === champion.id || semis.m2.a?.id === runnerUp.id) ? semis.m2.b : semis.m2.a,
  ];
  finishTournament(champion, runnerUp, semifinalistsOut, cur.fullStandings || []);
}

function finishSingleGroup() {
  const cur = appState.current;
  const finalTable = standingsFor(cur.players, cur.singleMatches, []);
  finishTournament(finalTable[0], finalTable[1], [], finalTable);
}

// ============ Historical stats ============
function computeHistoricalStats(archive) {
  const perPlayer = {};
  const ensure = (name) => {
    if (!perPlayer[name]) {
      perPlayer[name] = { name, titles:0, goalsScored:0, goalsConceded:0, promotions:0, runnerUps:0, finalAppearances:0, appearances:0 };
    }
    return perPlayer[name];
  };
  archive.forEach((t) => {
    if (t.champion) { ensure(t.champion).titles++; ensure(t.champion).finalAppearances++; }
    if (t.runnerUp) { ensure(t.runnerUp).runnerUps++; ensure(t.runnerUp).finalAppearances++; }
    (t.players || []).forEach((p) => {
      const s = ensure(p.name);
      s.goalsScored += p.gf || 0; s.goalsConceded += p.ga || 0; s.appearances++;
    });
    (t.promotedNames || []).forEach((name) => ensure(name).promotions++);
  });
  const list = Object.values(perPlayer);
  const topBy = (key, count=5) => [...list].sort((a,b) => b[key]-a[key]).filter(x => x[key] > 0).slice(0, count);
  const leastPromotions = [...list].filter(x => x.appearances >= 2)
    .sort((a,b) => a.promotions - b.promotions || b.appearances - a.appearances).slice(0, 5);
  return {
    mostTitles: topBy("titles"),
    mostGoalsScored: topBy("goalsScored"),
    mostGoalsConceded: topBy("goalsConceded"),
    mostRunnerUps: topBy("runnerUps"),
    mostFinalAppearances: topBy("finalAppearances"),
    leastPromotions,
  };
}

// ============ Render functions ============
function statBlockHtml(title, icon, rows, valueKey, suffix) {
  const rowsHtml = rows.length === 0
    ? `<div class="empty-note-sm">لا توجد بيانات بعد</div>`
    : rows.map((r,i) => `
        <div class="stat-row">
          <span class="stat-rank">${i+1}</span>
          <span style="flex:1">${escapeHtml(r.name)}</span>
          <span class="stat-value">${r[valueKey]} ${suffix}</span>
        </div>`).join("");
  return `<div class="stat-block"><div class="stat-block-title">${icon} ${title}</div>${rowsHtml}</div>`;
}

function statsPanelHtml(archive, compact) {
  const wrapClass = compact ? "sidebar-card" : "card";
  if (!archive || archive.length === 0) {
    return `<div class="${wrapClass}">
      <h3 class="group-title">📊 التصنيفات التاريخية</h3>
      <div class="empty-note">ما فيه بطولات مكتملة بعد. أول بطولة تخلص بتبدأ الإحصائيات تتحدث تلقائياً.</div>
    </div>`;
  }
  const stats = computeHistoricalStats(archive);
  let html = `<div class="${wrapClass}">
    <h3 class="group-title">📊 التصنيفات التاريخية (${archive.length} بطولة مكتملة)</h3>
    ${statBlockHtml("الأكثر تتويجاً","👑",stats.mostTitles,"titles","لقب")}
    ${statBlockHtml("الأكثر تسجيلاً للأهداف","⚽",stats.mostGoalsScored,"goalsScored","هدف")}
    ${statBlockHtml("الأكثر تلقياً للأهداف","🥅",stats.mostGoalsConceded,"goalsConceded","هدف")}
    ${statBlockHtml("الأكثر وصافة","🥈",stats.mostRunnerUps,"runnerUps","مرة")}
    ${statBlockHtml("الأكثر صعوداً للنهائي","🏁",stats.mostFinalAppearances,"finalAppearances","مرة")}
    ${statBlockHtml("الأقل صعوداً من مجموعته","📉",stats.leastPromotions,"promotions","مرة صعود")}`;
  if (!compact) {
    html += `<div class="archive-divider"></div><h3 class="group-title">🗂️ أرشيف البطولات</h3>`;
    html += archive.slice().reverse().map(t => `
      <div class="archive-row"><strong>${escapeHtml(t.name)}</strong> — 👑 ${escapeHtml(t.champion||"—")} | 🥈 ${escapeHtml(t.runnerUp||"—")}</div>
    `).join("");
  }
  html += `</div>`;
  return html;
}

function registerStageHtml() {
  const upcomingName = TOURNAMENT_NAMES[appState.tournamentIndex % TOURNAMENT_NAMES.length];
  const players = registerDraft.players;
  const groupMode = registerDraft.groupMode;
  const minNeeded = groupMode === "two" ? 3 : 2;
  const playersHtml = players.length === 0
    ? `<div class="empty-note">لسا ما فيه أسماء مسجلة</div>`
    : players.map((p,i) => `
        <div class="player-chip">
          <span class="player-num">${i+1}</span>
          <span style="flex:1">${escapeHtml(p.name)}</span>
          <button class="chip-remove" onclick="removePlayer('${p.id}')">✕</button>
        </div>`).join("");

  return `<div class="card">
    <div class="tournament-badge">البطولة القادمة: ${upcomingName}</div>
    <h2>📋 تسجيل المشاركين</h2>
    <p class="hint">أدخل اسم كل لاعب حاضر هالأسبوع، وبعدها اختر طريقة اللعب.</p>
    <div class="input-row">
      <input class="text-input" id="nameInput" value="${escapeHtml(registerDraft.nameInput)}" placeholder="اسم اللاعب..." onkeydown="if(event.key==='Enter') addPlayer()">
      <button class="primary-btn" onclick="addPlayer()">+ إضافة</button>
    </div>
    <div class="player-grid">${playersHtml}</div>
    <div class="count-badge">عدد المشاركين: ${players.length}</div>
    <div class="mode-switch">
      <button class="mode-btn ${groupMode==='two'?'active':''}" onclick="setGroupMode('two')">🎡 مجموعتين (قرعة دوارة)</button>
      <button class="mode-btn ${groupMode==='one'?'active':''}" onclick="setGroupMode('one')">🔀 مجموعة واحدة (بدون قرعة)</button>
    </div>
    <button class="cta-btn" ${players.length < minNeeded ? "disabled" : ""} onclick="startNewTournament()">
      ${groupMode==='two' ? 'تجهيز القرعة الدوارة →' : 'إنشاء جدول المباريات →'}
    </button>

}

function wheelStageHtml() {
  const cur = appState.current;
  const players = cur.players;
  const remaining = cur.remaining;
  const wheelOrder = cur.wheelOrder;
  const halfSize = Math.ceil(players.length / 2);
  const groupA = wheelOrder.slice(0, halfSize);
  const groupB = wheelOrder.slice(halfSize);
  const colors = ["#E8B84B","#1F5D45","#C0392B","#F4F1EA","#2C7A5B","#D9A62E"];
  const n = remaining.length;
  const wheelComplete = remaining.length === 0 && wheelOrder.length === players.length && players.length > 0;

  const labelsHtml = remaining.map((p,i) => {
    const segAngle = 360/n;
    const angle = i*segAngle + segAngle/2;
    return `<div class="wheel-label" style="transform: rotate(${angle}deg) translate(0,-108px) rotate(${-angle}deg)">${escapeHtml(p.name)}</div>`;
  }).join("");

  const groupAHtml = groupA.length === 0 ? `<div class="empty-note">—</div>`
    : groupA.map((p,i) => `<div class="group-row">${i+1}. ${escapeHtml(p.name)}</div>`).join("");
  const groupBHtml = groupB.length === 0 ? `<div class="empty-note">—</div>`
    : groupB.map((p,i) => `<div class="group-row">${i+1}. ${escapeHtml(p.name)}</div>`).join("");

  return `<div class="card">
    <div class="tournament-badge">${escapeHtml(cur.name)}</div>
    <h2>🎡 القرعة الدوارة</h2>
    <p class="hint">اضغط "ابدأ الدوران" ليطلع اسم عشوائي ويروح تلقائياً لأحد الفريقين.</p>
    <div class="wheel-area">
      <div class="wheel-wrap">
        <div class="pointer">▼</div>
        <div class="wheel" style="transform: rotate(${wheelUi.rotation}deg); background: ${n>0?conicGradient(n,colors):'#12321f'}">
          ${labelsHtml}
        </div>
        <div class="wheel-hub">⚽</div>
      </div>
      <button class="spin-btn" ${wheelUi.spinning || n===0 ? "disabled" : ""} onclick="spinWheel()">
        ${wheelUi.spinning ? "...تدور" : (n===0 ? "اكتملت القرعة" : "ابدأ الدوران")}
      </button>
      ${wheelUi.lastWinner && !wheelUi.spinning ? `<div class="winner-banner">🎉 ${escapeHtml(wheelUi.lastWinner.name)}</div>` : ""}
    </div>
    <div class="two-col">
      <div class="group-box"><h3 class="group-title">المجموعة الأولى</h3>${groupAHtml}</div>
      <div class="group-box"><h3 class="group-title">المجموعة الثانية</h3>${groupBHtml}</div>
    </div>
    ${wheelComplete ? `<button class="cta-btn" onclick="proceedToGroups()">الانتقال لجدول المباريات →</button>` : ""}
  </div>`;
}

function scoreTableHtml(table) {
  const rows = table.map((t,i) => `
    <tr class="${i<2?'qualify-row':''}">
      <td>${i+1}</td>
      <td style="text-align:right">${escapeHtml(t.name)}</td>
      <td>${t.played}</td>
      <td>${t.w}</td>
      <td>${t.l}</td>
      <td>${t.gd>0?'+'+t.gd:t.gd}</td>
      <td>${t.redCards}</td>
      <td style="font-weight:700">${t.pts}</td>
    </tr>`).join("");
  return `<table class="score-table">
    <thead><tr><th>#</th><th>اللاعب</th><th>لعب</th><th>ف</th><th>خ</th><th>فأ</th><th>🟥</th><th>نقاط</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function groupPanelHtml(title, matches, whichKey, table) {
  const matchRows = matches.map(m => `
    <div class="match-row">
      <span class="match-name">${escapeHtml(m.a.name)}</span>
      <input type="number" min="0" class="score-input" value="${m.scoreA ?? ''}" onchange="updateMatchField('${whichKey}','${m.id}','scoreA',this.value)">
      <span class="vs">-</span>
      <input type="number" min="0" class="score-input" value="${m.scoreB ?? ''}" onchange="updateMatchField('${whichKey}','${m.id}','scoreB',this.value)">
      <span class="match-name">${escapeHtml(m.b.name)}</span>
    </div>`).join("");

  const redRows = matches.map(m => `
    <div class="red-row">
      <span class="match-name-sm">${escapeHtml(m.a.name)}</span>
      <input type="number" min="0" class="red-input" value="${m.redA ?? 0}" onchange="updateMatchField('${whichKey}','${m.id}','redA',this.value)">
      <span class="vs-sm">|</span>
      <input type="number" min="0" class="red-input" value="${m.redB ?? 0}" onchange="updateMatchField('${whichKey}','${m.id}','redB',this.value)">
      <span class="match-name-sm">${escapeHtml(m.b.name)}</span>
    </div>`).join("");

  return `<div class="group-box">
    <h3 class="group-title">${title}</h3>
    <div class="match-list">${matchRows}</div>
    <div class="red-card-hint">🟥 بطاقات حمراء (اختياري لكل مباراة)</div>
    <div class="match-list">${redRows}</div>
    ${scoreTableHtml(table)}
  </div>`;
}

function groupsStageHtml() {
  const cur = appState.current;
  const tableA = standingsFor(cur.groupA, cur.matchesA, []);
  const tableB = standingsFor(cur.groupB, cur.matchesB, []);
  const allAPlayed = cur.matchesA.length > 0 && cur.matchesA.every(m => m.scoreA != null && m.scoreB != null);
  const allBPlayed = cur.matchesB.length > 0 && cur.matchesB.every(m => m.scoreA != null && m.scoreB != null);

  return `<div class="card">
    <div class="tournament-badge">${escapeHtml(cur.name)}</div>
    <h2>⚔️ دوري المجموعات</h2>
    <p class="hint">أدخل نتيجة كل مباراة والبطاقات الحمراء. ترتيب الصعود: نقاط ← أهداف مسجلة ← أقل بطاقات حمراء ← قرعة عشوائية عند التعادل التام.</p>
    <div class="two-col">
      ${groupPanelHtml("المجموعة الأولى", cur.matchesA, "A", tableA)}
      ${groupPanelHtml("المجموعة الثانية", cur.matchesB, "B", tableB)}
    </div>
    <button class="cta-btn" ${!(allAPlayed && allBPlayed) ? "disabled" : ""} onclick="goToKnockout()">الانتقال لنصف النهائي →</button>
    ${!(allAPlayed && allBPlayed) ? `<div class="empty-note">أكمل جميع نتائج المجموعتين للمتابعة</div>` : ""}
  </div>`;
}

function singleGroupStageHtml() {
  const cur = appState.current;
  const table = standingsFor(cur.players, cur.singleMatches, []);
  const allPlayed = cur.singleMatches.length > 0 && cur.singleMatches.every(m => m.scoreA != null && m.scoreB != null);
  return `<div class="card">
    <div class="tournament-badge">${escapeHtml(cur.name)}</div>
    <h2>🔀 مجموعة واحدة — الكل ضد الكل</h2>
    <p class="hint">جدول مباريات عشوائي بين جميع المشاركين، بدون قرعة. أدخل النتائج والبطاقات الحمراء يدوياً.</p>
    ${groupPanelHtml(`جدول المباريات (${cur.players.length} مشاركين)`, cur.singleMatches, "SINGLE", table)}
    <button class="cta-btn" ${!allPlayed ? "disabled" : ""} onclick="finishSingleGroup()">إنهاء البطولة وتتويج البطل →</button>
  </div>`;
}

function semiPanelHtml(label, match, key) {
  const tieWarn = (match.scoreA != null && match.scoreB != null && match.scoreA === match.scoreB)
    ? `<div class="warn-note">⚠️ تعادل — الأدوار الإقصائية لازم يكون فيها فائز، عدّل النتيجة</div>` : "";
  return `<div class="group-box">
    <h3 class="group-title">${label}</h3>
    <div class="match-row">
      <span class="match-name">${escapeHtml(match.a?.name ?? "—")}</span>
      <input type="number" min="0" class="score-input" value="${match.scoreA ?? ''}" onchange="updateSemiField('${key}','scoreA',this.value)">
      <span class="vs">-</span>
      <input type="number" min="0" class="score-input" value="${match.scoreB ?? ''}" onchange="updateSemiField('${key}','scoreB',this.value)">
      <span class="match-name">${escapeHtml(match.b?.name ?? "—")}</span>
    </div>
    ${tieWarn}
  </div>`;
}

function knockoutStageHtml() {
  const cur = appState.current;
  const semis = cur.semis;
  const semisComplete = semis.m1.scoreA != null && semis.m1.scoreB != null && semis.m2.scoreA != null && semis.m2.scoreB != null;
  const final = cur.final;
  const champion = final && final.scoreA != null && final.scoreB != null
    ? (final.scoreA > final.scoreB ? final.a : final.scoreA < final.scoreB ? final.b : null) : null;

  let finalHtml = "";
  if (!final) {
    finalHtml = `<button class="cta-btn" ${!semisComplete ? "disabled" : ""} onclick="goToFinal()">الانتقال للنهائي →</button>`;
  } else {
    finalHtml = `<div class="final-box">
      <h3 class="group-title">🏁 النهائي الكبير</h3>
      <div class="match-row">
        <span class="match-name">${escapeHtml(final.a.name)}</span>
        <input type="number" min="0" class="score-input" value="${final.scoreA ?? ''}" onchange="updateFinalField('scoreA',this.value)">
        <span class="vs">-</span>
        <input type="number" min="0" class="score-input" value="${final.scoreB ?? ''}" onchange="updateFinalField('scoreB',this.value)">
        <span class="match-name">${escapeHtml(final.b.name)}</span>
      </div>
      ${champion ? `
        <div class="champion-banner">👑 بطل ${escapeHtml(cur.name)}: ${escapeHtml(champion.name)}</div>
        <button class="cta-btn" onclick="finishKnockout()">حفظ النتيجة النهائية وأرشفة البطولة →</button>
      ` : ""}
    </div>`;
  }

  return `<div class="card">
    <div class="tournament-badge">${escapeHtml(cur.name)}</div>
    <h2>🏆 الأدوار الإقصائية</h2>
    <div class="two-col">
      ${semiPanelHtml("نصف النهائي 1", semis.m1, "m1")}
      ${semiPanelHtml("نصف النهائي 2", semis.m2, "m2")}
    </div>
    ${finalHtml}
  </div>`;
}

function tournamentFlowHtml() {
  const cur = appState.current;
  if (!cur) return registerStageHtml();
  if (cur.stage === "wheel") return wheelStageHtml();
  if (cur.stage === "groups") return groupsStageHtml();
  if (cur.stage === "single") return singleGroupStageHtml();
  if (cur.stage === "knockout") return knockoutStageHtml();
  return "";
}

function render() {
  if (!loaded) {
    app.innerHTML = `<div class="loading-box">جارِ تحميل بيانات الدوري المشتركة...</div>`;
    return;
  }
  const headerSubtitle = appState.current ? escapeHtml(appState.current.name) : "بانتظار بطولة جديدة";
  app.innerHTML = `
    <header>
      <div class="header-badge">⚽</div>
      <div style="flex:1">
        <h1>دوري أبطال العزبة</h1>
        <p class="subtitle">${headerSubtitle} — بيانات مباشرة لكل المستخدمين</p>
      </div>
    </header>
    <div class="tab-row">
      <button class="tab-btn ${view==='tournament'?'active':''}" onclick="setView('tournament')">🏆 البطولة الحالية</button>
      <button class="tab-btn ${view==='stats'?'active':''}" onclick="setView('stats')">📊 التصنيفات التاريخية</button>
    </div>
    <div class="layout">
      <main>${view === "tournament" ? tournamentFlowHtml() : statsPanelHtml(appState.archive, false)}</main>
      ${view === "tournament" ? `<aside class="sidebar">${statsPanelHtml(appState.archive, true)}</aside>` : ""}
    </div>
  `;
}

// ============ UI event handlers exposed globally ============
window.addPlayer = function() {
  const input = document.getElementById("nameInput");
  const name = (input.value || "").trim();
  if (!name) return;
  registerDraft.players.push({ id: uid(), name });
  registerDraft.nameInput = "";
  render();
  const newInput = document.getElementById("nameInput");
  if (newInput) newInput.focus();
};
window.removePlayer = function(id) {
  registerDraft.players = registerDraft.players.filter(p => p.id !== id);
  render();
};
window.setGroupMode = function(mode) {
  registerDraft.groupMode = mode;
  render();
};
window.setView = function(v) {
  view = v;
  render();
};
window.startNewTournament = startNewTournament;
window.spinWheel = spinWheel;
window.proceedToGroups = proceedToGroups;
window.updateMatchField = updateMatchField;
window.goToKnockout = goToKnockout;
window.updateSemiField = updateSemiField;
window.goToFinal = goToFinal;
window.updateFinalField = updateFinalField;
window.finishKnockout = finishKnockout;
window.finishSingleGroup = finishSingleGroup;

init();
</script>
